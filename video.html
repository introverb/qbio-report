<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUBIE Video</title>
    <style>
        /* ---------- Brand fonts ---------- */
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_pro.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_italic_pro.otf") format("opentype"); font-weight: 400; font-style: italic; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_bold_pro.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: "Chap"; src: url("assets/fonts/Chap-Regular.woff2") format("woff2"); font-weight: 400; font-style: normal; font-display: swap; }

        :root {
            --cream:       #FFFCF6;
            --cream-warm:  #FAF4E8;
            --cream-dim:   #EEE8DF;
            --dark-purple: #25101D;
            --deep-plum:   #4B243C;
            --light-purple:#854B6E;
            --pink:        #D57DB2;
            --pale-pink:   #FFCEEC;
            --cyan:        #7DD3D3;
            --gold:        #E5C46B;
            --coral:       #FF6568;
            --near-black:  #120810;
            --soft-text:   #4B243C;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: "Apercu Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--dark-purple);
            color: var(--cream);
            font-size: 15px;
            line-height: 1.5;
        }

        /* ---- Site nav (split public/admin) ---- */
        .site-nav {
            background: var(--near-black);
            border-bottom: 1px solid rgba(238, 232, 223, 0.10);
            padding: 12px 24px;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .site-nav .nav-public, .site-nav .nav-admin { display: flex; align-items: center; }
        .site-nav a { text-decoration: none; border-bottom: none; margin: 0 6px; padding: 4px 8px; }
        .site-nav .sep { color: rgba(238, 232, 223, 0.25); padding: 0 2px; font-weight: 400; }
        .site-nav .nav-public a { color: rgba(238, 232, 223, 0.70); }
        .site-nav .nav-public a:hover { color: var(--pink); }
        .site-nav .nav-public a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .site-nav .nav-admin {
            border: 1px solid rgba(238, 232, 223, 0.18);
            border-radius: 999px;
            padding: 2px 8px;
            background: rgba(238, 232, 223, 0.04);
        }
        .site-nav .nav-admin a { color: rgba(238, 232, 223, 0.55); }
        .site-nav .nav-admin a:hover { color: var(--pink); }
        .site-nav .nav-admin a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .site-nav .nav-admin .sep { color: rgba(238, 232, 223, 0.18); }

        /* ---- Masthead ---- */
        .masthead {
            text-align: center;
            padding: 40px 24px 24px;
            max-width: 820px;
            margin: 0 auto;
        }
        .masthead .title {
            font-family: "Chap", "Apercu Pro", sans-serif;
            font-weight: 400;
            font-size: 56px;
            letter-spacing: 0.06em;
            color: var(--cream);
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }
        .masthead .subtitle {
            font-style: italic;
            font-size: 13px;
            color: rgba(238, 232, 223, 0.65);
            margin: 14px 0 10px;
            letter-spacing: 0.05em;
        }
        .masthead .dateline {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 700;
        }

        /* ---- Layout container ---- */
        .page-wide {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        /* ---- Source picker (same pattern as /chatter) ---- */
        .source-picker-row { text-align: center; margin-bottom: 40px; position: relative; }
        .source-picker-btn {
            background: transparent;
            border: 1px solid rgba(238, 232, 223, 0.35);
            color: rgba(238, 232, 223, 0.80);
            font-family: inherit;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 7px 14px;
            border-radius: 999px;
            cursor: pointer;
        }
        .source-picker-btn:hover { color: var(--pink); border-color: var(--pink); }
        .source-picker-btn.open {
            background: rgba(238, 232, 223, 0.10);
            color: var(--cream);
            border-color: rgba(238, 232, 223, 0.45);
        }
        .source-picker-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            width: min(420px, calc(100vw - 48px));
            max-height: 60vh;
            overflow-y: auto;
            background: rgba(18, 8, 16, 0.95);
            border: 1px solid rgba(238, 232, 223, 0.20);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            padding: 12px 14px;
            text-align: left;
            z-index: 100;
        }
        .source-picker-actions {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(238, 232, 223, 0.55);
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dotted rgba(238, 232, 223, 0.15);
        }
        .source-picker-actions a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid rgba(229, 196, 107, 0.4);
            cursor: pointer;
            margin-right: 10px;
        }
        .source-picker-actions a:hover { color: var(--pink); border-bottom-color: var(--pink); }
        .source-picker-panel label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 4px;
            font-size: 13px;
            color: var(--cream);
            cursor: pointer;
            border-radius: 2px;
        }
        .source-picker-panel label:hover { background: rgba(238, 232, 223, 0.06); }
        .source-picker-panel input[type="checkbox"] { accent-color: var(--pink); cursor: pointer; }
        .source-picker-panel .label-name { flex: 1 1 auto; }
        .source-picker-panel .label-count { font-size: 11px; font-style: italic; color: rgba(238, 232, 223, 0.55); }

        /* ---- Section labels ---- */
        .section-label {
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.45em;
            color: var(--cream);
            text-transform: uppercase;
            margin: 20px 0 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        .section-label::before, .section-label::after {
            content: "";
            display: inline-block;
            width: 20px; height: 23px;
            background: url("assets/logo-icon.svg") no-repeat center / contain;
            filter: brightness(0) invert(0.92) sepia(0.15) hue-rotate(310deg);
        }

        /* ---- Featured grid (top) ---- */
        .featured-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 72px;
        }
        @media (max-width: 900px) { .featured-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .featured-grid { grid-template-columns: 1fr; } }

        .video-card {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .video-card .save-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            z-index: 2;
            background: rgba(18, 8, 16, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 50%;
        }
        .archive-item { position: relative; }
        .archive-item .save-btn {
            position: absolute;
            top: 4px;
            right: 4px;
        }
        .archive-item .title { padding-right: 28px; }
        .video-card .thumb-wrap {
            position: relative;
            aspect-ratio: 16 / 9;
            background: var(--near-black);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 1px solid rgba(238, 232, 223, 0.10);
        }
        .video-card .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.25s;
        }
        .video-card:hover .thumb-wrap img { transform: scale(1.03); }
        .video-card .thumb-wrap .play-badge {
            position: absolute;
            inset: auto 0 0 0;
            padding: 6px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            color: var(--cream);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 700;
            text-align: right;
        }
        .video-card h3 {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.3;
            margin: 0 0 4px;
            text-transform: uppercase;
            letter-spacing: 0.005em;
        }
        .video-card h3 a {
            color: var(--cream);
            text-decoration: none;
        }
        .video-card h3 a:hover { color: var(--pink); }
        .video-card .meta {
            font-size: 11px;
            color: rgba(238, 232, 223, 0.55);
            letter-spacing: 0.05em;
        }
        .video-card .meta .source { font-style: italic; }

        /* ---- Archive grid (bottom) — same card style as Featured so every
           video gets a 16:9 thumbnail front-and-center ---- */
        .archive-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }
        @media (max-width: 900px) { .archive-list { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .archive-list { grid-template-columns: 1fr; } }
        .archive-item {
            position: relative;
            display: flex;
            flex-direction: column;
            background: rgba(18, 8, 16, 0.40);
            border: 1px solid rgba(238, 232, 223, 0.08);
            border-radius: 6px;
            padding: 12px;
            transition: border-color 0.15s, background 0.15s;
        }
        .archive-item:hover {
            background: rgba(18, 8, 16, 0.60);
            border-color: rgba(238, 232, 223, 0.22);
        }
        .archive-item .thumb-wrap {
            position: relative;
            aspect-ratio: 16 / 9;
            background: var(--near-black);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 1px solid rgba(238, 232, 223, 0.10);
            display: block;
        }
        .archive-item .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.25s;
        }
        .archive-item:hover .thumb-wrap img { transform: scale(1.03); }
        .archive-item .play-badge {
            position: absolute;
            inset: auto 0 0 0;
            padding: 4px 8px;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            color: var(--cream);
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 700;
            text-align: right;
        }
        .archive-item .title {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 0.005em;
            margin: 0 0 4px;
            padding-right: 28px;  /* leaves room for save-btn */
        }
        .archive-item .title a { color: var(--cream); text-decoration: none; }
        .archive-item .title a:hover { color: var(--pink); }
        .archive-item .save-btn {
            position: absolute;
            top: 18px; right: 18px;
            z-index: 2;
            background: rgba(18, 8, 16, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 50%;
        }
        /* Clamp every video/archive title to 3 lines with an ellipsis */
        .video-card h3,
        .archive-item .title {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .archive-item .meta {
            font-size: 11px;
            color: rgba(238, 232, 223, 0.55);
            letter-spacing: 0.05em;
        }
        .archive-item .meta .source { font-style: italic; }

        .status { text-align: center; color: rgba(238, 232, 223, 0.55); font-style: italic; padding: 40px; font-size: 13px; }

        /* ---- Footer ---- */
        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 10px;
            color: rgba(238, 232, 223, 0.55);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0 24px;
        }
        footer a {
            color: var(--cream);
            text-decoration: none;
            border-bottom: 1px solid rgba(238, 232, 223, 0.35);
        }
        footer a:hover { color: var(--pink); border-bottom-color: var(--pink); }
        footer .copyright { font-style: italic; margin-top: 8px; letter-spacing: 0.08em; }

    </style>
</head>

<script>
    const TZ = "America/Los_Angeles";
    function formatDateline(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        const date = d.toLocaleDateString("en-US", { timeZone: TZ, weekday: "short", month: "short", day: "2-digit", year: "numeric" });
        const time = d.toLocaleTimeString("en-US", { timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false, timeZoneName: "short" });
        return `${date} · ${time}`.toUpperCase();
    }
    function formatTimestamp(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        return d.toLocaleString("en-US", { timeZone: TZ, month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit", timeZoneName: "short" });
    }
    function formatArticleDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        const now = new Date();
        const hours = (now - d) / (1000 * 60 * 60);
        if (hours < 1)  return "< 1h ago";
        if (hours < 24) return `${Math.round(hours)}h ago`;
        if (hours < 48) return "yesterday";
        return d.toLocaleDateString("en-US", { timeZone: TZ, month: "short", day: "numeric", year: "numeric" });
    }
    function escapeHtml(s) {
        return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // Placeholder gradient for cards with no thumbnail
    const PLACEHOLDER_THUMB = "data:image/svg+xml;utf8," + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 9"><rect width="16" height="9" fill="#120810"/><text x="8" y="5.5" text-anchor="middle" fill="#D57DB2" font-family="sans-serif" font-size="1.2" font-weight="700">▶</text></svg>'
    );

    let allItems = [];
    let allSourcesSet = new Set();
    let selectedSources = new Set();

    // Videos come from YouTube API (source = "YouTube · <channel>") or RSS
    // (same format). Keep per-channel granularity since channels are meaningful.
    function normalizeSource(src) {
        return src || "(unknown)";
    }

    function saveBtnHtml(a) {
        return `<button class="save-btn" data-link="${(a.link || '').replace(/"/g, '&quot;')}" aria-label="Save">${window.QBIO_SAVES_BOOKMARK_SVG || ''}</button>`;
    }

    function renderFeaturedCard(a) {
        const when = a.date_iso ? formatArticleDate(a.date_iso) : "";
        const thumb = a.thumbnail || PLACEHOLDER_THUMB;
        return `
            <div class="video-card">
                ${saveBtnHtml(a)}
                <a href="${a.link}" target="_blank" class="thumb-wrap" title="Watch on YouTube">
                    <img src="${thumb}" alt="" loading="lazy">
                    <div class="play-badge">Watch on YouTube &rarr;</div>
                </a>
                <h3><a href="${a.link}" target="_blank">${a.title}</a></h3>
                <div class="meta">
                    <span class="source">${a.source}</span>${when ? ` &middot; ${when}` : ""}
                </div>
            </div>`;
    }

    function renderArchiveItem(a) {
        const when = a.date_iso ? formatArticleDate(a.date_iso) : "";
        const thumb = a.thumbnail || PLACEHOLDER_THUMB;
        return `
            <div class="archive-item">
                ${saveBtnHtml(a)}
                <a href="${a.link}" target="_blank" class="thumb-wrap" title="Watch on YouTube">
                    <img src="${thumb}" alt="" loading="lazy">
                    <div class="play-badge">Watch &rarr;</div>
                </a>
                <div class="title"><a href="${a.link}" target="_blank">${a.title}</a></div>
                <div class="meta">
                    <span class="source">${a.source}</span>${when ? ` &middot; ${when}` : ""}
                </div>
            </div>`;
    }

    function applyFilter() {
        const filtered = allItems.filter(a => selectedSources.has(normalizeSource(a.source)));
        const featuredWrap = document.getElementById("featured-wrap");
        const archiveWrap  = document.getElementById("archive-wrap");

        if (!filtered.length) {
            featuredWrap.hidden = true;
            archiveWrap.hidden  = true;
            document.getElementById("status").style.display = "block";
            document.getElementById("status").textContent = "No videos match the current filter.";
            return;
        }
        document.getElementById("status").style.display = "none";

        // Featured: top 9 by score (tiebreak by date)
        const sortedByScore = filtered.slice().sort((a, b) => {
            const ds = (b.score || 0) - (a.score || 0);
            if (ds !== 0) return ds;
            return (b.date_iso || "").localeCompare(a.date_iso || "");
        });
        const featured = sortedByScore.slice(0, 9);
        const featuredLinks = new Set(featured.map(a => a.link));

        featuredWrap.hidden = featured.length === 0;
        document.getElementById("featured-grid").innerHTML = featured.map(renderFeaturedCard).join("");

        // Archive: the rest, sorted by date desc
        const archive = filtered
            .filter(a => !featuredLinks.has(a.link))
            .sort((a, b) => (b.date_iso || "").localeCompare(a.date_iso || ""));
        archiveWrap.hidden = archive.length === 0;
        document.getElementById("archive-list").innerHTML = archive.map(renderArchiveItem).join("");

        if (window.qbioRefreshSaveIcons) window.qbioRefreshSaveIcons();
    }

    function updatePickerLabel() {
        const label = document.getElementById("source-picker-label");
        const total = allSourcesSet.size;
        const picked = selectedSources.size;
        if (picked === total) label.textContent = "Sources: all";
        else if (picked === 0) label.textContent = "Sources: none";
        else label.textContent = `Sources: ${picked}/${total}`;
    }

    function buildSourcePicker() {
        const counts = {};
        for (const a of allItems) {
            const key = normalizeSource(a.source);
            counts[key] = (counts[key] || 0) + 1;
        }
        const sortedKeys = Object.keys(counts).sort();
        allSourcesSet = new Set(sortedKeys);
        selectedSources = new Set(sortedKeys);

        const list = document.getElementById("source-picker-list");
        list.innerHTML = sortedKeys.map(key => `
            <label>
                <input type="checkbox" data-src="${encodeURIComponent(key)}" checked>
                <span class="label-name">${key}</span>
                <span class="label-count">${counts[key]}</span>
            </label>`).join("");
        list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener("change", () => {
                const src = decodeURIComponent(cb.dataset.src);
                if (cb.checked) selectedSources.add(src);
                else selectedSources.delete(src);
                applyFilter();
                updatePickerLabel();
            });
        });
        updatePickerLabel();
    }

    // Source picker open/close
    const pickerBtn = document.getElementById("source-picker-btn");
    const pickerPanel = document.getElementById("source-picker-panel");
    pickerBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = !pickerPanel.hasAttribute("hidden");
        if (isOpen) { pickerPanel.setAttribute("hidden", ""); pickerBtn.classList.remove("open"); }
        else        { pickerPanel.removeAttribute("hidden"); pickerBtn.classList.add("open"); }
    });
    document.addEventListener("click", (e) => {
        if (!pickerPanel.hasAttribute("hidden") && !pickerPanel.contains(e.target) && e.target !== pickerBtn) {
            pickerPanel.setAttribute("hidden", "");
            pickerBtn.classList.remove("open");
        }
    });
    document.getElementById("source-picker-all").addEventListener("click", (e) => {
        e.preventDefault();
        selectedSources = new Set(allSourcesSet);
        document.querySelectorAll("#source-picker-list input[type='checkbox']").forEach(cb => cb.checked = true);
        applyFilter(); updatePickerLabel();
    });
    document.getElementById("source-picker-none").addEventListener("click", (e) => {
        e.preventDefault();
        selectedSources = new Set();
        document.querySelectorAll("#source-picker-list input[type='checkbox']").forEach(cb => cb.checked = false);
        applyFilter(); updatePickerLabel();
    });

    // Fetch feed and render
    fetch("/feed.json")
        .then(r => { if (!r.ok) throw new Error("NO FEED.JSON — scraper hasn't run yet."); return r.json(); })
        .then(data => {
            const articles = data.articles || [];
            allItems = articles
                .filter(a => a.source_category === "video")
                .slice()
                .sort((a, b) => (b.date_iso || "").localeCompare(a.date_iso || ""));

            // Register every video with the saves layer.
            allItems.forEach(a => window.qbioRegisterArticle && window.qbioRegisterArticle(a));

            document.getElementById("dateline").textContent =
                `${formatDateline(data.generated_at)} · ${allItems.length} VIDEOS`;
            document.getElementById("footer-timestamp").textContent =
                `Feed generated ${formatTimestamp(data.generated_at)}`;

            if (!allItems.length) {
                document.getElementById("status").textContent =
                    "No videos in the feed yet. Check back after the next scrape, or have Olli trigger one.";
                return;
            }

            buildSourcePicker();
            applyFilter();
        })
        .catch(err => {
            document.getElementById("status").textContent = err.message;
        });
</script>

</body>
</html>
