<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUBIE Video</title>
    <style>
        /* ---------- Brand fonts ---------- */
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_pro.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_italic_pro.otf") format("opentype"); font-weight: 400; font-style: italic; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_bold_pro.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: "Chap"; src: url("assets/fonts/Chap-Regular.woff2") format("woff2"); font-weight: 400; font-style: normal; font-display: swap; }

        :root {
            --cream:       #EEE8DF;
            --cream-dim:   #E5DED2;
            --dark-purple: #2D1B30;
            --light-purple:#7D4A6E;
            --pink:        #D57DB2;
            --near-black:  #1A1416;
            --soft-text:   #3A3036;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: "Apercu Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--cream);
            color: var(--near-black);
            font-size: 15px;
            line-height: 1.5;
        }

        /* ---- Site nav (split public/admin) ---- */
        .site-nav {
            background: var(--cream-dim);
            border-bottom: 1px solid rgba(45, 27, 48, 0.2);
            padding: 10px 24px;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .site-nav .nav-public, .site-nav .nav-admin { display: flex; align-items: center; }
        .site-nav a { text-decoration: none; margin: 0 6px; padding: 4px 8px; }
        .site-nav .sep { color: rgba(45, 27, 48, 0.35); padding: 0 2px; font-weight: 400; }
        .site-nav .nav-public a { color: var(--dark-purple); }
        .site-nav .nav-public a:hover { color: var(--pink); }
        .site-nav .nav-public a.active { color: var(--pink); border-bottom: 2px solid var(--pink); }
        .site-nav .nav-admin {
            border: 1px solid rgba(45, 27, 48, 0.25);
            border-radius: 3px;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.15);
        }
        .site-nav .nav-admin a { color: var(--light-purple); opacity: 0.8; }
        .site-nav .nav-admin a:hover { color: var(--pink); opacity: 1; }

        /* ---- Masthead ---- */
        .masthead {
            text-align: center;
            padding: 40px 24px 24px;
            max-width: 820px;
            margin: 0 auto;
        }
        .masthead .title {
            font-family: "Chap", "Apercu Pro", sans-serif;
            font-weight: 400;
            font-size: 56px;
            letter-spacing: 0.06em;
            color: var(--dark-purple);
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }
        .masthead .subtitle {
            font-style: italic;
            font-size: 13px;
            color: var(--soft-text);
            margin: 14px 0 10px;
            letter-spacing: 0.05em;
        }
        .masthead .dateline {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--dark-purple);
            font-weight: 700;
        }

        /* ---- Layout container ---- */
        .page-wide {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        /* ---- Source picker (same pattern as /chatter) ---- */
        .source-picker-row { text-align: center; margin-bottom: 40px; position: relative; }
        .source-picker-btn {
            background: transparent;
            border: 1px solid var(--light-purple);
            color: var(--light-purple);
            font-family: inherit;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 7px 14px;
            border-radius: 2px;
            cursor: pointer;
        }
        .source-picker-btn:hover { color: var(--pink); border-color: var(--pink); }
        .source-picker-btn.open {
            background: var(--light-purple);
            color: var(--cream);
        }
        .source-picker-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            width: min(420px, calc(100vw - 48px));
            max-height: 60vh;
            overflow-y: auto;
            background: var(--cream);
            border: 1px solid var(--dark-purple);
            border-radius: 3px;
            box-shadow: 0 8px 24px rgba(45, 27, 48, 0.2);
            padding: 12px 14px;
            text-align: left;
            z-index: 100;
        }
        .source-picker-actions {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--soft-text);
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dotted rgba(45, 27, 48, 0.2);
        }
        .source-picker-actions a {
            color: var(--light-purple);
            text-decoration: none;
            border-bottom: 1px solid var(--light-purple);
            cursor: pointer;
            margin-right: 10px;
        }
        .source-picker-panel label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 4px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 2px;
        }
        .source-picker-panel label:hover { background: var(--cream-dim); }
        .source-picker-panel .label-name { flex: 1 1 auto; }
        .source-picker-panel .label-count { font-size: 11px; font-style: italic; color: var(--light-purple); }

        /* ---- Section labels ---- */
        .section-label {
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.45em;
            color: var(--dark-purple);
            text-transform: uppercase;
            margin: 20px 0 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        .section-label::before, .section-label::after {
            content: "";
            display: inline-block;
            width: 20px; height: 23px;
            background: url("assets/logo-icon.svg") no-repeat center / contain;
        }

        /* ---- Featured grid (top) ---- */
        .featured-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 72px;
        }
        @media (max-width: 900px) { .featured-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .featured-grid { grid-template-columns: 1fr; } }

        .video-card {
            display: flex;
            flex-direction: column;
        }
        .video-card .thumb-wrap {
            position: relative;
            aspect-ratio: 16 / 9;
            background: var(--dark-purple);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .video-card .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.25s;
        }
        .video-card:hover .thumb-wrap img { transform: scale(1.03); }
        .video-card .thumb-wrap .play-badge {
            position: absolute;
            inset: auto 0 0 0;
            padding: 6px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            color: var(--cream);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 700;
            text-align: right;
        }
        .video-card h3 {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.3;
            margin: 0 0 4px;
            text-transform: uppercase;
            letter-spacing: 0.005em;
        }
        .video-card h3 a {
            color: var(--near-black);
            text-decoration: none;
        }
        .video-card h3 a:hover { color: var(--pink); }
        .video-card .meta {
            font-size: 11px;
            color: var(--light-purple);
            letter-spacing: 0.05em;
        }
        .video-card .meta .source { font-style: italic; }

        /* ---- Archive list (bottom) ---- */
        .archive-list { display: flex; flex-direction: column; gap: 14px; }
        .archive-item {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 16px;
            align-items: start;
            padding-bottom: 14px;
            border-bottom: 1px dotted rgba(45, 27, 48, 0.2);
        }
        @media (max-width: 560px) {
            .archive-item { grid-template-columns: 80px 1fr; gap: 12px; }
        }
        .archive-item .thumb {
            aspect-ratio: 16 / 9;
            background: var(--dark-purple);
            border-radius: 2px;
            overflow: hidden;
        }
        .archive-item .thumb img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .archive-item .title {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.25;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .archive-item .title a { color: var(--near-black); text-decoration: none; }
        .archive-item .title a:hover { color: var(--pink); }
        .archive-item .meta {
            font-size: 11px;
            color: var(--light-purple);
            letter-spacing: 0.05em;
        }
        .archive-item .meta .source { font-style: italic; }

        .status { text-align: center; color: var(--soft-text); font-style: italic; padding: 40px; font-size: 13px; }

        /* ---- Footer ---- */
        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 10px;
            color: var(--soft-text);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0 24px;
        }
        footer a {
            color: var(--dark-purple);
            text-decoration: none;
            border-bottom: 1px solid var(--dark-purple);
        }
        footer a:hover { color: var(--pink); border-bottom-color: var(--pink); }
        footer .copyright { font-style: italic; margin-top: 8px; letter-spacing: 0.08em; }
    </style>
</head>
<body>

<nav class="site-nav">
    <div class="nav-public">
        <a href="/">Report</a>
        <span class="sep">·</span>
        <a href="/chatter">Chatter</a>
        <span class="sep">·</span>
        <a href="/video" class="active">Video</a>
        <span class="sep">·</span>
        <a href="/suggest">Suggest</a>
    </div>
    <div class="nav-admin">
        <a href="/admin">Admin</a>
    </div>
</nav>

<header class="masthead">
    <div class="title">QUBIE Video</div>
    <div class="subtitle">&mdash; lectures, talks, and video explainers from across the quantum biology universe &mdash;</div>
    <div class="dateline" id="dateline">Loading&hellip;</div>
</header>

<main class="page-wide">
    <div class="source-picker-row">
        <button type="button" id="source-picker-btn" class="source-picker-btn">
            <span id="source-picker-label">Sources: all</span>
            <span class="caret">&#9662;</span>
        </button>
        <div id="source-picker-panel" class="source-picker-panel" hidden>
            <div class="source-picker-actions">
                <a id="source-picker-all">Select all</a>
                <a id="source-picker-none">Clear</a>
            </div>
            <div id="source-picker-list"></div>
        </div>
    </div>

    <div id="status" class="status">Loading video feed&hellip;</div>

    <div id="featured-wrap" hidden>
        <div class="section-label">Featured</div>
        <div class="featured-grid" id="featured-grid"></div>
    </div>

    <div id="archive-wrap" hidden>
        <div class="section-label">Archive</div>
        <div class="archive-list" id="archive-list"></div>
    </div>
</main>

<footer>
    <div id="footer-timestamp">Feed generated&hellip;</div>
    <div style="margin-top:6px;"><a href="https://quantumbiologydao.xyz" target="_blank">quantumbiologydao.xyz</a></div>
    <div class="copyright">&copy; Quantum Biology DAO</div>
</footer>

<script>
    function formatDateline(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        const date = d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "2-digit", year: "numeric" });
        const time = d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
        return `${date} · ${time}`.toUpperCase();
    }
    function formatTimestamp(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
    }
    function formatArticleDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        const now = new Date();
        const hours = (now - d) / (1000 * 60 * 60);
        if (hours < 1)  return "< 1h ago";
        if (hours < 24) return `${Math.round(hours)}h ago`;
        if (hours < 48) return "yesterday";
        return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }
    function escapeHtml(s) {
        return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // Placeholder gradient for cards with no thumbnail
    const PLACEHOLDER_THUMB = "data:image/svg+xml;utf8," + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 9"><rect width="16" height="9" fill="#2D1B30"/><text x="8" y="5.5" text-anchor="middle" fill="#D57DB2" font-family="sans-serif" font-size="1.2" font-weight="700">▶</text></svg>'
    );

    let allItems = [];
    let allSourcesSet = new Set();
    let selectedSources = new Set();

    // Videos come from YouTube API (source = "YouTube · <channel>") or RSS
    // (same format). Keep per-channel granularity since channels are meaningful.
    function normalizeSource(src) {
        return src || "(unknown)";
    }

    function renderFeaturedCard(a) {
        const when = a.date_iso ? formatArticleDate(a.date_iso) : "";
        const thumb = a.thumbnail || PLACEHOLDER_THUMB;
        return `
            <div class="video-card">
                <a href="${a.link}" target="_blank" class="thumb-wrap" title="Watch on YouTube">
                    <img src="${thumb}" alt="" loading="lazy">
                    <div class="play-badge">Watch on YouTube &rarr;</div>
                </a>
                <h3><a href="${a.link}" target="_blank">${a.title}</a></h3>
                <div class="meta">
                    <span class="source">${a.source}</span>${when ? ` &middot; ${when}` : ""}
                </div>
            </div>`;
    }

    function renderArchiveItem(a) {
        const when = a.date_iso ? formatArticleDate(a.date_iso) : "";
        const thumb = a.thumbnail || PLACEHOLDER_THUMB;
        return `
            <div class="archive-item">
                <a href="${a.link}" target="_blank" class="thumb" title="Watch on YouTube">
                    <img src="${thumb}" alt="" loading="lazy">
                </a>
                <div>
                    <div class="title"><a href="${a.link}" target="_blank">${a.title}</a></div>
                    <div class="meta">
                        <span class="source">${a.source}</span>${when ? ` &middot; ${when}` : ""}
                    </div>
                </div>
            </div>`;
    }

    function applyFilter() {
        const filtered = allItems.filter(a => selectedSources.has(normalizeSource(a.source)));
        const featuredWrap = document.getElementById("featured-wrap");
        const archiveWrap  = document.getElementById("archive-wrap");

        if (!filtered.length) {
            featuredWrap.hidden = true;
            archiveWrap.hidden  = true;
            document.getElementById("status").style.display = "block";
            document.getElementById("status").textContent = "No videos match the current filter.";
            return;
        }
        document.getElementById("status").style.display = "none";

        // Featured: top 9 by score (tiebreak by date)
        const sortedByScore = filtered.slice().sort((a, b) => {
            const ds = (b.score || 0) - (a.score || 0);
            if (ds !== 0) return ds;
            return (b.date_iso || "").localeCompare(a.date_iso || "");
        });
        const featured = sortedByScore.slice(0, 9);
        const featuredLinks = new Set(featured.map(a => a.link));

        featuredWrap.hidden = featured.length === 0;
        document.getElementById("featured-grid").innerHTML = featured.map(renderFeaturedCard).join("");

        // Archive: the rest, sorted by date desc
        const archive = filtered
            .filter(a => !featuredLinks.has(a.link))
            .sort((a, b) => (b.date_iso || "").localeCompare(a.date_iso || ""));
        archiveWrap.hidden = archive.length === 0;
        document.getElementById("archive-list").innerHTML = archive.map(renderArchiveItem).join("");
    }

    function updatePickerLabel() {
        const label = document.getElementById("source-picker-label");
        const total = allSourcesSet.size;
        const picked = selectedSources.size;
        if (picked === total) label.textContent = "Sources: all";
        else if (picked === 0) label.textContent = "Sources: none";
        else label.textContent = `Sources: ${picked}/${total}`;
    }

    function buildSourcePicker() {
        const counts = {};
        for (const a of allItems) {
            const key = normalizeSource(a.source);
            counts[key] = (counts[key] || 0) + 1;
        }
        const sortedKeys = Object.keys(counts).sort();
        allSourcesSet = new Set(sortedKeys);
        selectedSources = new Set(sortedKeys);

        const list = document.getElementById("source-picker-list");
        list.innerHTML = sortedKeys.map(key => `
            <label>
                <input type="checkbox" data-src="${encodeURIComponent(key)}" checked>
                <span class="label-name">${key}</span>
                <span class="label-count">${counts[key]}</span>
            </label>`).join("");
        list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener("change", () => {
                const src = decodeURIComponent(cb.dataset.src);
                if (cb.checked) selectedSources.add(src);
                else selectedSources.delete(src);
                applyFilter();
                updatePickerLabel();
            });
        });
        updatePickerLabel();
    }

    // Source picker open/close
    const pickerBtn = document.getElementById("source-picker-btn");
    const pickerPanel = document.getElementById("source-picker-panel");
    pickerBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = !pickerPanel.hasAttribute("hidden");
        if (isOpen) { pickerPanel.setAttribute("hidden", ""); pickerBtn.classList.remove("open"); }
        else        { pickerPanel.removeAttribute("hidden"); pickerBtn.classList.add("open"); }
    });
    document.addEventListener("click", (e) => {
        if (!pickerPanel.hasAttribute("hidden") && !pickerPanel.contains(e.target) && e.target !== pickerBtn) {
            pickerPanel.setAttribute("hidden", "");
            pickerBtn.classList.remove("open");
        }
    });
    document.getElementById("source-picker-all").addEventListener("click", (e) => {
        e.preventDefault();
        selectedSources = new Set(allSourcesSet);
        document.querySelectorAll("#source-picker-list input[type='checkbox']").forEach(cb => cb.checked = true);
        applyFilter(); updatePickerLabel();
    });
    document.getElementById("source-picker-none").addEventListener("click", (e) => {
        e.preventDefault();
        selectedSources = new Set();
        document.querySelectorAll("#source-picker-list input[type='checkbox']").forEach(cb => cb.checked = false);
        applyFilter(); updatePickerLabel();
    });

    // Fetch feed and render
    fetch("/feed.json")
        .then(r => { if (!r.ok) throw new Error("NO FEED.JSON — scraper hasn't run yet."); return r.json(); })
        .then(data => {
            const articles = data.articles || [];
            allItems = articles
                .filter(a => a.source_category === "video")
                .slice()
                .sort((a, b) => (b.date_iso || "").localeCompare(a.date_iso || ""));

            document.getElementById("dateline").textContent =
                `${formatDateline(data.generated_at)} · ${allItems.length} VIDEOS`;
            document.getElementById("footer-timestamp").textContent =
                `Feed generated ${formatTimestamp(data.generated_at)}`;

            if (!allItems.length) {
                document.getElementById("status").textContent =
                    "No videos in the feed yet. Check back after the next scrape, or have Olli trigger one.";
                return;
            }

            buildSourcePicker();
            applyFilter();
        })
        .catch(err => {
            document.getElementById("status").textContent = err.message;
        });
</script>

</body>
</html>
