<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUBIE News — Sources</title>
    <link rel="stylesheet" href="assets/shared.css">
    <style>
        /* ---- Dark-mode override of shared.css (aligns with index.html) ---- */
        :root {
            --cream:       #FFFCF6;
            --cream-warm:  #FAF4E8;
            --cream-dim:   #EEE8DF;
            --dark-purple: #25101D;
            --deep-plum:   #4B243C;
            --light-purple:#854B6E;
            --pink:        #D57DB2;
            --pale-pink:   #FFCEEC;
            --cyan:        #7DD3D3;
            --gold:        #E5C46B;
            --coral:       #FF6568;
            --near-black:  #120810;
            --soft-text:   #4B243C;
        }
        body {
            background: var(--dark-purple);
            color: var(--cream);
        }
        a { color: var(--cream); border-bottom: 1px solid rgba(238, 232, 223, 0.35); }
        a:hover { color: var(--pink); border-bottom-color: var(--pink); }

        /* Site nav — dark plum */
        .site-nav {
            background: var(--near-black);
            border-bottom: 1px solid rgba(238, 232, 223, 0.10);
        }
        .site-nav .sep { color: rgba(238, 232, 223, 0.25); }
        .site-nav .nav-public a { color: rgba(238, 232, 223, 0.70); }
        .site-nav .nav-public a:hover { color: var(--pink); }
        .site-nav .nav-public a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .site-nav .nav-admin {
            border: 1px solid rgba(238, 232, 223, 0.18);
            border-radius: 999px;
            padding: 2px 8px;
            background: rgba(238, 232, 223, 0.04);
        }
        .site-nav .nav-admin a { color: rgba(238, 232, 223, 0.55); opacity: 1; }
        .site-nav .nav-admin a:hover { color: var(--pink); }
        .site-nav .nav-admin a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .site-nav .nav-admin .sep { color: rgba(238, 232, 223, 0.18); }

        /* Headings + subtitle */
        .admin-page h1 { color: var(--cream); }
        .admin-page .subtitle { color: rgba(238, 232, 223, 0.55); }

        /* Forms — dark inputs */
        input[type="text"], input[type="number"], input[type="search"], select, textarea {
            font-family: inherit;
            font-size: 14px;
            padding: 8px 12px;
            border: 1px solid rgba(238, 232, 223, 0.18);
            background: rgba(18, 8, 16, 0.50);
            color: var(--cream);
            border-radius: 8px;
        }
        input::placeholder, textarea::placeholder { color: rgba(238, 232, 223, 0.40); }
        input:focus, select:focus, textarea:focus {
            outline: 2px solid var(--pink);
            outline-offset: -2px;
            border-color: var(--pink);
        }
        select option { background: var(--near-black); color: var(--cream); }

        /* Buttons */
        button {
            background: var(--dark-purple);
            color: var(--cream);
            border: 1px solid rgba(238, 232, 223, 0.18);
            border-radius: 6px;
        }
        button:hover { background: var(--pink); color: var(--near-black); border-color: var(--pink); }
        button.secondary { background: transparent; color: var(--cream); }
        button.secondary:hover { background: transparent; color: var(--pink); border-color: var(--pink); }
        button.danger {
            background: transparent;
            border-color: rgba(238, 232, 223, 0.30);
            color: rgba(238, 232, 223, 0.65);
        }
        button.danger:hover {
            background: var(--coral); color: var(--near-black); border-color: var(--coral);
        }

        /* Flash messages */
        .flash {
            background: rgba(18, 8, 16, 0.40);
            border: 1px solid rgba(238, 232, 223, 0.10);
            border-left: 3px solid var(--pink);
            color: rgba(238, 232, 223, 0.75);
            border-radius: 8px;
        }
        .flash.error {
            border-left-color: var(--coral);
            color: var(--coral);
        }

        /* Empty state */
        .empty-state { color: rgba(238, 232, 223, 0.55); }

        /* Tabs */
        .tabs {
            border-bottom: 1px solid rgba(238, 232, 223, 0.18);
        }
        .tab { color: rgba(238, 232, 223, 0.55); }
        .tab:hover { color: var(--cream); }
        .tab.active {
            color: var(--gold);
            background: rgba(18, 8, 16, 0.50);
            border-color: rgba(238, 232, 223, 0.18);
            border-bottom: 1px solid rgba(18, 8, 16, 0.50);
        }

        /* Data tables */
        table.data th, table.data td {
            border-bottom: 1px solid rgba(238, 232, 223, 0.10);
            color: var(--cream);
        }
        table.data th {
            color: rgba(238, 232, 223, 0.65);
            background: rgba(18, 8, 16, 0.50);
        }
        table.data tbody tr:nth-child(odd) td { background: rgba(238, 232, 223, 0.03); }
        table.data tbody tr:nth-child(even) td { background: transparent; }
        /* Status row tints — semantic colors over dark */
        table.data tr.status-error td   { background: rgba(255, 101, 104, 0.12); }
        table.data tr.status-nohits td  { background: rgba(229, 196, 107, 0.10); }
        table.data tr.status-working td { background: rgba(125, 211, 211, 0.08); }
        table.data td.mono { color: rgba(238, 232, 223, 0.55); font-family: monospace; font-size: 11px; }

        /* Badges — outline pill style matching index.html */
        .badge {
            background: transparent !important;
            border: 1px solid currentColor !important;
            border-radius: 999px;
            padding: 2px 8px 1px;
            letter-spacing: 0.18em;
        }
        .badge-paper    { color: var(--gold); }
        .badge-preprint { color: var(--cyan); }
        .badge-news     { color: var(--coral); }
        .badge-forums   { color: var(--pale-pink); }
        .badge-social   { color: var(--pink); }
        .badge-video    { color: var(--cream); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .stat-bar {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            font-size: 12px;
            color: rgba(238, 232, 223, 0.55);
            margin-bottom: 24px;
            letter-spacing: 0.05em;
        }
        .stat-bar b {
            color: var(--cream);
            font-size: 20px;
            display: block;
            letter-spacing: 0;
        }
        .request-form {
            background: rgba(18, 8, 16, 0.40);
            border: 1px solid rgba(238, 232, 223, 0.10);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .request-form h3 {
            margin: 0 0 14px;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cream);
        }
        .request-form .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        @media (max-width: 640px) { .request-form .form-grid { grid-template-columns: 1fr; } }
        .request-form input, .request-form select, .request-form textarea {
            width: 100%;
        }
        .request-form textarea { min-height: 50px; resize: vertical; }

        /* Popped-out Source Requests block */
        .requests-block {
            margin-top: 56px;
            padding-top: 40px;
            border-top: 1px solid rgba(238, 232, 223, 0.18);
        }
        .requests-block .requests-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .requests-block h2 {
            font-family: "Chap", "Apercu Pro", sans-serif;
            font-weight: 400;
            font-size: 30px;
            letter-spacing: 0.06em;
            color: var(--cream);
            text-transform: uppercase;
            margin: 0 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        .requests-block h2::before,
        .requests-block h2::after {
            content: "";
            display: inline-block;
            width: 22px;
            height: 25px;
            background: url("assets/logo-icon.svg") no-repeat center / contain;
            filter: brightness(0) invert(0.92) sepia(0.15) hue-rotate(310deg);
        }
        .requests-block .requests-subtitle {
            font-style: italic;
            font-size: 12px;
            color: rgba(238, 232, 223, 0.55);
            letter-spacing: 0.03em;
        }
        .requests-block .requests-subtitle a {
            color: var(--cream);
            border-bottom: 1px solid rgba(238, 232, 223, 0.35);
        }
        .requests-block .requests-subtitle a:hover {
            color: var(--pink);
            border-bottom-color: var(--pink);
        }
    </style>
</head>
<body>

<nav class="site-nav">
    <div class="nav-public">
        <a href="/">Report</a>
        <span class="sep">·</span>
        <a href="/chatter">Chatter</a>
        <span class="sep">·</span>
        <a href="/video">Video</a>
        <span class="sep">·</span>
        <a href="/twitter">Twitter</a>
        <span class="sep">·</span>
        <a href="/suggest">Suggest</a>
    </div>
    <div class="nav-admin" id="user-nav-slot">
        <a href="/login">Log in</a>
    </div>
</nav>

<main class="admin-page">
    <h1>Sources</h1>
    <div class="subtitle" id="subtitle">Loading &hellip;</div>

    <div class="stat-bar" id="summary-bar"></div>

    <div class="tabs" id="tabs"></div>

    <div id="panels"></div>

    <!-- Source Requests block: popped out of the tabs for visibility -->
    <section class="requests-block" id="requests-block">
        <div class="requests-header">
            <h2>Source Requests</h2>
            <div class="requests-subtitle">
                &mdash; requests you (or DAO members via <a href="/suggest">/suggest</a>) have filed. Olli actions these manually. &mdash;
            </div>
        </div>
        <div id="panel-requests"></div>
    </section>
</main>

<script>
    // --------------------------------------------------------------------
    // Tab layout config — order + labels + whether editable
    // --------------------------------------------------------------------
    const TIER_KEYS = [
        { key: "Tier 1",  label: "RSS Feeds" },
        { key: "Tier 2",  label: "Search APIs" },
        { key: "Tier 3a", label: "Forums" },
        { key: "Tier 3b", label: "Social" },
    ];

    const TAB_ORDER = [
        { id: "summary",  label: "Summary" },
        { id: "tier-1",   label: "Tier 1 — RSS" },
        { id: "tier-2",   label: "Tier 2 — APIs" },
        { id: "tier-3a",  label: "Tier 3a — Forums" },
        { id: "tier-3b",  label: "Tier 3b — Social" },
    ];

    function showFlash(msg, isError, target) {
        const el = document.createElement("div");
        el.className = "flash " + (isError ? "error" : "");
        el.textContent = msg;
        target.prepend(el);
        setTimeout(() => el.remove(), 4000);
    }

    // --------------------------------------------------------------------
    // Tab rendering
    // --------------------------------------------------------------------
    function renderTabs() {
        const tabsEl = document.getElementById("tabs");
        tabsEl.innerHTML = TAB_ORDER.map(t =>
            `<div class="tab" data-tab="${t.id}">${t.label}</div>`).join("");
        tabsEl.querySelectorAll(".tab").forEach(t => {
            t.addEventListener("click", () => activateTab(t.dataset.tab));
        });
    }

    function activateTab(id) {
        document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === id));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === `panel-${id}`));
        history.replaceState(null, "", `#${id}`);
    }

    function rowClass(status) {
        if (status === "ERROR") return "status-error";
        if ((status || "").startsWith("Working (no hits)") || status === "No results returned") return "status-nohits";
        if ((status || "").startsWith("Working")) return "status-working";
        return "";
    }

    // --------------------------------------------------------------------
    // Summary tab
    // --------------------------------------------------------------------
    function renderSummary(data) {
        const rows = (data.summary || []).map(s => `
            <tr>
                <td><b>${s.tier}</b></td>
                <td>${s.sources_configured}</td>
                <td>${s.articles_contributed}</td>
                <td>${s.errored > 0 ? `<span style="color:var(--coral)">${s.errored}</span>` : s.errored}</td>
            </tr>`).join("");
        const when = new Date(data.generated_at).toLocaleString("en-US",
            { timeZone: "America/Los_Angeles", month:"short", day:"numeric", year:"numeric", hour:"numeric", minute:"2-digit", timeZoneName: "short" });
        return `
            <table class="data">
                <thead><tr>
                    <th>Tier</th><th>Sources</th><th>Articles Contributed</th><th>Errored</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>
            <div class="subtitle">Last scraped: ${when} &nbsp;·&nbsp; ${data.unique_articles_after_dedup} unique articles after dedup</div>
        `;
    }

    // --------------------------------------------------------------------
    // Tier tabs (Tier 1 / 2 / 3a / 3b)
    // --------------------------------------------------------------------
    function renderTier(rows) {
        if (!rows || !rows.length) {
            return '<div class="empty-state">No sources configured in this tier.</div>';
        }
        const body = rows.map(r => `
            <tr class="${rowClass(r.status)}">
                <td><b>${r.source_name}</b></td>
                <td class="mono">${r.target}</td>
                <td><span class="badge badge-${r.category}">${r.category}</span></td>
                <td style="text-align:right;">${r.matched}</td>
                <td style="text-align:right;">${r.total}</td>
                <td>${r.status}</td>
                <td style="color: var(--coral);">${r.error || ""}</td>
                <td style="color: rgba(238, 232, 223, 0.55); font-style: italic;">${r.notes || ""}</td>
            </tr>`).join("");
        return `
            <table class="data">
                <thead><tr>
                    <th>Source</th><th>Target / URL</th><th>Category</th>
                    <th style="text-align:right;">Matched</th>
                    <th style="text-align:right;">Total</th>
                    <th>Status</th><th>Error</th><th>Notes</th>
                </tr></thead>
                <tbody>${body}</tbody>
            </table>
        `;
    }

    // --------------------------------------------------------------------
    // Source Requests tab (editable)
    // --------------------------------------------------------------------
    function requestFormHtml() {
        return `
            <div class="request-form" id="request-form">
                <h3>+ Add a source request</h3>
                <div class="form-grid">
                    <input type="text" id="req-source-name" placeholder="Source name (e.g. Biophysical Journal)">
                    <select id="req-type">
                        <option value="">Type…</option>
                        <option>RSS</option>
                        <option>API</option>
                        <option>Forum</option>
                        <option>Social</option>
                        <option>Other</option>
                    </select>
                    <input type="text" id="req-url" placeholder="URL or endpoint (or subreddit name, hashtag, etc.)">
                    <select id="req-priority">
                        <option value="">Priority…</option>
                        <option>High</option>
                        <option selected>Medium</option>
                        <option>Low</option>
                    </select>
                    <select id="req-api">
                        <option value="">API key needed?</option>
                        <option selected>No</option>
                        <option>Yes</option>
                        <option>Unknown</option>
                    </select>
                    <input type="text" id="req-status" placeholder="Status (default: Requested)">
                </div>
                <textarea id="req-notes" placeholder="Why this source? Any context for Olli to act on…"></textarea>
                <div style="margin-top:10px;">
                    <button id="req-submit">Submit request</button>
                    <button class="secondary" id="req-clear">Clear</button>
                </div>
            </div>
        `;
    }

    function renderRequestsTable(requests) {
        if (!requests.length) {
            return '<div class="empty-state">No source requests yet. Use the form above to add one.</div>';
        }
        return `
            <table class="data">
                <thead><tr>
                    <th>Source</th><th>Type</th><th>URL / Target</th><th>Why / Notes</th>
                    <th>API?</th><th>Priority</th><th>Status</th><th></th>
                </tr></thead>
                <tbody>
                ${requests.map(r => `
                    <tr>
                        <td><b>${r.source_name}</b></td>
                        <td>${r.type}</td>
                        <td class="mono">${r.url}</td>
                        <td>${r.why_notes}</td>
                        <td>${r.api_key_needed}</td>
                        <td>${r.priority}</td>
                        <td>${r.status}</td>
                        <td><button class="danger" data-row="${r.row_number}">Delete</button></td>
                    </tr>`).join("")}
                </tbody>
            </table>
        `;
    }

    async function loadAndRenderRequests() {
        const resp = await fetch("/api/source-requests");
        const data = await resp.json();
        document.getElementById("requests-list").innerHTML = renderRequestsTable(data.requests || []);
        document.querySelectorAll("button[data-row]").forEach(btn => {
            btn.addEventListener("click", async () => {
                const row = btn.dataset.row;
                if (!confirm("Delete this request?")) return;
                const r = await fetch(`/api/source-requests/${row}`, { method: "DELETE" });
                if (r.ok) {
                    showFlash("Request deleted.", false, document.querySelector("#panel-requests"));
                    loadAndRenderRequests();
                } else {
                    showFlash("Failed to delete.", true, document.querySelector("#panel-requests"));
                }
            });
        });
    }

    function wireRequestForm() {
        const btn = document.getElementById("req-submit");
        const clearBtn = document.getElementById("req-clear");
        const fields = ["req-source-name","req-type","req-url","req-priority","req-api","req-status","req-notes"];

        btn.addEventListener("click", async () => {
            const payload = {
                source_name:     document.getElementById("req-source-name").value,
                type:            document.getElementById("req-type").value,
                url:             document.getElementById("req-url").value,
                why_notes:       document.getElementById("req-notes").value,
                api_key_needed:  document.getElementById("req-api").value,
                priority:        document.getElementById("req-priority").value,
                status:          document.getElementById("req-status").value,
            };
            const resp = await fetch("/api/source-requests", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            if (resp.ok) {
                fields.forEach(id => { document.getElementById(id).value = ""; });
                showFlash("Request submitted. Logged to source_requests_log.md for Olli to action.",
                    false, document.querySelector("#panel-requests"));
                loadAndRenderRequests();
            } else {
                const err = await resp.json().catch(() => ({}));
                showFlash(err.error || "Submit failed.", true, document.querySelector("#panel-requests"));
            }
        });
        clearBtn.addEventListener("click", () => {
            fields.forEach(id => { document.getElementById(id).value = ""; });
        });
    }

    // --------------------------------------------------------------------
    // Main loader
    // --------------------------------------------------------------------
    async function init() {
        renderTabs();

        const panelsEl = document.getElementById("panels");
        panelsEl.innerHTML = TAB_ORDER.map(t =>
            `<div class="tab-panel" id="panel-${t.id}"></div>`).join("");
        // Note: #panel-requests lives OUTSIDE of #panels (popped out into its
        // own always-visible block below the tabs), so it's not toggled by
        // the tab switching logic.

        let data;
        try {
            const r = await fetch("/api/sources");
            if (!r.ok) throw new Error("No sources.json — run the scraper first.");
            data = await r.json();
        } catch (e) {
            document.getElementById("subtitle").textContent = "Source data unavailable.";
            document.getElementById("panel-summary").innerHTML = `<div class="flash error">${e.message}</div>`;
            activateTab("summary");
            return;
        }

        // Subtitle + summary stats
        document.getElementById("subtitle").textContent =
            `&mdash; live inventory of every source QUBIE News pulls from &mdash;`;
        document.getElementById("subtitle").innerHTML =
            "&mdash; live inventory of every source QUBIE News pulls from &mdash;";
        const totalSources = (data.summary || []).reduce((s, x) => s + x.sources_configured, 0);
        const totalArticles = (data.summary || []).reduce((s, x) => s + x.articles_contributed, 0);
        const totalErrored = (data.summary || []).reduce((s, x) => s + x.errored, 0);
        document.getElementById("summary-bar").innerHTML = `
            <div><b>${totalSources}</b>sources configured</div>
            <div><b>${totalArticles}</b>articles contributed</div>
            <div><b>${data.unique_articles_after_dedup}</b>unique after dedup</div>
            <div><b style="color:${totalErrored > 0 ? 'var(--coral)' : 'var(--cream)'};">${totalErrored}</b>errored</div>
        `;

        // Summary tab
        document.getElementById("panel-summary").innerHTML = renderSummary(data);

        // Tier tabs
        const tierIds = ["tier-1", "tier-2", "tier-3a", "tier-3b"];
        TIER_KEYS.forEach((t, i) => {
            document.getElementById(`panel-${tierIds[i]}`).innerHTML =
                renderTier((data.tiers || {})[t.key] || []);
        });

        // Source Requests tab (editable)
        document.getElementById("panel-requests").innerHTML =
            requestFormHtml() +
            '<div id="requests-list"></div>';
        wireRequestForm();
        loadAndRenderRequests();

        // Activate from hash or default to summary
        const wanted = (location.hash || "").replace("#", "");
        activateTab(TAB_ORDER.some(t => t.id === wanted) ? wanted : "summary");
    }

    init();
</script>

</body>
</html>
