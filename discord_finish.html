<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUBIE News — Pick a username</title>
    <style>
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_pro.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_bold_pro.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: "Chap"; src: url("assets/fonts/Chap-Regular.woff2") format("woff2"); font-weight: 400; font-style: normal; font-display: swap; }

        :root {
            --cream: #EEE8DF;
            --cream-dim: #E5DED2;
            --dark-purple: #2D1B30;
            --light-purple: #7D4A6E;
            --pink: #D57DB2;
            --near-black: #1A1416;
            --soft-text: #3A3036;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: "Apercu Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--cream);
            color: var(--near-black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            max-width: 440px;
            width: 100%;
            text-align: center;
        }

        .title {
            font-family: "Chap", "Apercu Pro", sans-serif;
            font-weight: 400;
            font-size: 44px;
            letter-spacing: 0.06em;
            color: var(--dark-purple);
            margin: 0 0 6px;
            line-height: 1;
            text-transform: uppercase;
        }
        .subtitle {
            font-style: italic;
            font-size: 12px;
            color: var(--soft-text);
            margin: 0 0 28px;
            letter-spacing: 0.05em;
        }

        .blurb {
            font-size: 13px;
            color: var(--soft-text);
            line-height: 1.5;
            margin-bottom: 22px;
        }
        .blurb b {
            color: var(--dark-purple);
            font-weight: 700;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }
        input[type="text"] {
            width: 100%;
            font-family: inherit;
            font-size: 15px;
            padding: 10px 14px;
            border: 1px solid var(--dark-purple);
            background: var(--cream);
            color: var(--near-black);
            border-radius: 2px;
        }
        input[type="text"]:focus {
            outline: 2px solid var(--pink);
            outline-offset: -2px;
        }
        .helper {
            font-size: 11px;
            color: var(--soft-text);
            text-align: left;
            line-height: 1.4;
            margin: -2px 2px 4px;
        }
        button {
            font-family: inherit;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 10px 22px;
            border: 1px solid var(--dark-purple);
            background: var(--dark-purple);
            color: var(--cream);
            border-radius: 2px;
            cursor: pointer;
        }
        button:hover {
            background: var(--pink);
            border-color: var(--pink);
            color: var(--near-black);
        }

        .error {
            color: #c55;
            font-size: 13px;
            font-style: italic;
            margin-top: 10px;
            min-height: 20px;
        }

        .back {
            margin-top: 36px;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .back a {
            color: var(--light-purple);
            text-decoration: none;
            border-bottom: 1px solid var(--light-purple);
            padding-bottom: 2px;
        }
        .back a:hover { color: var(--pink); border-bottom-color: var(--pink); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="title">QUBIE News</div>
    <div class="subtitle">&mdash; one last step &mdash;</div>

    <div class="blurb">
        Connected to Discord as <b>{{DISCORD_NAME}}</b>.
        Pick a public username for your QUBIE Report profile &mdash;
        this is what others will see at <code>/u/&lt;name&gt;</code>.
    </div>

    <form method="POST" action="/auth/discord/finish">
        <input type="text" name="username" placeholder="Username" value="{{SUGGESTED}}" autofocus required>
        <div class="helper">2&ndash;24 characters &middot; letters, numbers, . _ or -</div>
        <button type="submit">Create my account</button>
    </form>
    <div class="error">{{ERROR_MESSAGE}}</div>

    <div class="back"><a href="/logout">&larr; Cancel</a></div>
</div>

</body>
</html>
