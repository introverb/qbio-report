<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUBIE Report — Pick a username</title>
    <style>
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_pro.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_bold_pro.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: "Chap"; src: url("assets/fonts/Chap-Regular.woff2") format("woff2"); font-weight: 400; font-style: normal; font-display: swap; }

        :root {
            --cream:       #FFFCF6;
            --cream-warm:  #FAF4E8;
            --cream-dim:   #EEE8DF;
            --dark-purple: #25101D;
            --deep-plum:   #4B243C;
            --light-purple:#854B6E;
            --pink:        #D57DB2;
            --pale-pink:   #FFCEEC;
            --cyan:        #7DD3D3;
            --gold:        #E5C46B;
            --coral:       #FF6568;
            --near-black:  #120810;
            --soft-text:   #4B243C;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: "Apercu Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--dark-purple);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            max-width: 440px;
            width: 100%;
            text-align: center;
            background: rgba(18, 8, 16, 0.50);
            border: 1px solid rgba(238, 232, 223, 0.10);
            border-radius: 12px;
            padding: 40px 32px;
        }

        .title {
            font-family: "Chap", "Apercu Pro", sans-serif;
            font-weight: 400;
            font-size: 44px;
            letter-spacing: 0.06em;
            color: var(--cream);
            margin: 0 0 6px;
            line-height: 1;
            text-transform: uppercase;
        }
        .subtitle {
            font-style: italic;
            font-size: 12px;
            color: rgba(238, 232, 223, 0.65);
            margin: 0 0 28px;
            letter-spacing: 0.05em;
        }

        .blurb {
            font-size: 13px;
            color: rgba(238, 232, 223, 0.75);
            line-height: 1.5;
            margin-bottom: 22px;
        }
        .blurb b {
            color: var(--cream);
            font-weight: 700;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }
        input[type="text"] {
            width: 100%;
            font-family: inherit;
            font-size: 15px;
            padding: 10px 14px;
            border: 1px solid rgba(238, 232, 223, 0.18);
            background: rgba(18, 8, 16, 0.50);
            color: var(--cream);
            border-radius: 6px;
        }
        input[type="text"]::placeholder {
            color: rgba(238, 232, 223, 0.40);
        }
        input[type="text"]:focus {
            outline: 2px solid var(--pink);
            outline-offset: -2px;
            border-color: var(--pink);
        }
        .helper {
            font-size: 11px;
            color: rgba(238, 232, 223, 0.50);
            text-align: left;
            line-height: 1.4;
            margin: -2px 2px 4px;
        }
        button {
            font-family: inherit;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 10px 22px;
            border: 1px solid rgba(238, 232, 223, 0.18);
            background: var(--dark-purple);
            color: var(--cream);
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: var(--pink);
            border-color: var(--pink);
            color: var(--near-black);
        }

        .error {
            color: var(--coral);
            font-size: 13px;
            font-style: italic;
            margin-top: 10px;
            min-height: 20px;
        }

        .back {
            margin-top: 36px;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .back a {
            color: rgba(238, 232, 223, 0.55);
            text-decoration: none;
            border-bottom: 1px solid rgba(238, 232, 223, 0.35);
            padding-bottom: 2px;
        }
        .back a:hover { color: var(--pink); border-bottom-color: var(--pink); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="title">QUBIE Report</div>
    <div class="subtitle">&mdash; one last step &mdash;</div>

    <div class="blurb">
        Connected to Discord as <b>{{DISCORD_NAME}}</b>.
        Pick a public username for your QUBIE Report profile &mdash;
        this is what others will see at <code>/u/&lt;name&gt;</code>.
    </div>

    <form method="POST" action="/auth/discord/finish">
        <input type="text" name="username" placeholder="Username" value="{{SUGGESTED}}" autofocus required>
        <div class="helper">2&ndash;24 characters &middot; letters, numbers, . _ or -</div>
        <button type="submit">Create my account</button>
    </form>
    <div class="error">{{ERROR_MESSAGE}}</div>

    <div class="back"><a href="/logout">&larr; Cancel</a></div>
</div>

</body>
</html>
