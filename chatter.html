<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUBIE Chatter</title>
    <style>
        /* ---------- Brand Fonts ---------- */
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_pro.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_italic_pro.otf") format("opentype"); font-weight: 400; font-style: italic; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_medium_pro.otf") format("opentype"); font-weight: 500; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_bold_pro.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: "Chap"; src: url("assets/fonts/Chap-Regular.woff2") format("woff2"); font-weight: 400; font-style: normal; font-display: swap; }

        :root {
            --cream:       #FFFCF6;
            --cream-warm:  #FAF4E8;
            --cream-dim:   #EEE8DF;
            --dark-purple: #25101D;
            --deep-plum:   #4B243C;
            --light-purple:#854B6E;
            --pink:        #D57DB2;
            --pale-pink:   #FFCEEC;
            --cyan:        #7DD3D3;
            --gold:        #E5C46B;
            --coral:       #FF6568;
            --near-black:  #120810;
            --soft-text:   #4B243C;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: "Apercu Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--dark-purple);
            color: var(--cream);
            font-size: 15px;
            line-height: 1.5;
        }

        /* ---- Site nav: public group (left) + admin group in a box (right) ---- */
        .site-nav {
            background: var(--near-black);
            border-bottom: 1px solid rgba(238, 232, 223, 0.10);
            padding: 12px 24px;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .site-nav .nav-public, .site-nav .nav-admin { display: flex; align-items: center; }
        .site-nav a { text-decoration: none; border-bottom: none; margin: 0 6px; padding: 4px 8px; }
        .site-nav .sep { color: rgba(238, 232, 223, 0.25); padding: 0 2px; font-weight: 400; }
        .site-nav .nav-public a { color: rgba(238, 232, 223, 0.70); }
        .site-nav .nav-public a:hover { color: var(--pink); }
        .site-nav .nav-public a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .site-nav .nav-admin {
            border: 1px solid rgba(238, 232, 223, 0.18);
            border-radius: 999px;
            padding: 2px 8px;
            background: rgba(238, 232, 223, 0.04);
        }
        .site-nav .nav-admin a { color: rgba(238, 232, 223, 0.55); }
        .site-nav .nav-admin a:hover { color: var(--pink); }
        .site-nav .nav-admin a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .site-nav .nav-admin .sep { color: rgba(238, 232, 223, 0.18); }

        /* ---- Masthead ---- */
        .masthead {
            text-align: center;
            padding: 40px 24px 24px;
            max-width: 820px;
            margin: 0 auto;
        }
        .masthead .title {
            font-family: "Chap", "Apercu Pro", sans-serif;
            font-weight: 400;
            font-size: 56px;
            letter-spacing: 0.06em;
            color: var(--cream);
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }
        .masthead .subtitle {
            font-style: italic;
            font-size: 13px;
            color: rgba(238, 232, 223, 0.65);
            margin: 14px 0 10px;
            letter-spacing: 0.05em;
        }
        .masthead .dateline {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 700;
        }

        /* ---- Layout ---- */
        .page-wide {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        .filter-row {
            text-align: center;
            margin-bottom: 12px;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(238, 232, 223, 0.55);
            font-weight: 700;
        }
        /* Sources dropdown — narrow the feed to specific sources */
        .source-picker-row {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        .source-picker-btn {
            background: transparent;
            border: 1px solid rgba(238, 232, 223, 0.35);
            color: rgba(238, 232, 223, 0.80);
            font-family: inherit;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 7px 14px;
            border-radius: 999px;
            cursor: pointer;
        }
        .source-picker-btn:hover { color: var(--pink); border-color: var(--pink); }
        .source-picker-btn .caret { margin-left: 4px; font-style: normal; }
        .source-picker-btn.open {
            background: rgba(238, 232, 223, 0.10);
            color: var(--cream);
            border-color: rgba(238, 232, 223, 0.45);
        }

        .source-picker-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            width: min(420px, calc(100vw - 48px));
            max-height: 60vh;
            overflow-y: auto;
            background: rgba(18, 8, 16, 0.95);
            border: 1px solid rgba(238, 232, 223, 0.20);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            padding: 12px 14px;
            text-align: left;
            z-index: 100;
        }
        .source-picker-panel::-webkit-scrollbar { width: 8px; }
        .source-picker-panel::-webkit-scrollbar-thumb {
            background: rgba(238, 232, 223, 0.25);
            border-radius: 4px;
        }

        .source-picker-actions {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 700;
            color: rgba(238, 232, 223, 0.55);
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dotted rgba(238, 232, 223, 0.15);
        }
        .source-picker-actions a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid rgba(229, 196, 107, 0.4);
            cursor: pointer;
            margin-right: 10px;
        }
        .source-picker-actions a:hover { color: var(--pink); border-bottom-color: var(--pink); }

        .source-picker-row label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 4px;
            font-size: 13px;
            color: var(--cream);
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
            cursor: pointer;
            border-radius: 2px;
        }
        .source-picker-row label:hover { background: rgba(238, 232, 223, 0.06); }
        .source-picker-row input[type="checkbox"] {
            accent-color: var(--pink);
            cursor: pointer;
        }
        .source-picker-row .label-name { flex: 1 1 auto; }
        .source-picker-row .label-count {
            font-size: 11px;
            font-style: italic;
            color: rgba(238, 232, 223, 0.55);
            letter-spacing: 0.05em;
        }
        /* 0-item sources: muted but still interactive (in case they produce hits later) */
        .source-picker-row label.empty { opacity: 0.5; }
        .source-picker-row label.empty:hover { opacity: 0.75; background: rgba(238, 232, 223, 0.04); }
        .source-picker-row label.empty .label-count { color: rgba(238, 232, 223, 0.40); }
        .filter-row button {
            background: transparent;
            border: 1px solid rgba(238, 232, 223, 0.35);
            color: rgba(238, 232, 223, 0.80);
            font-family: inherit;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 6px 14px;
            margin: 0 4px;
            border-radius: 999px;
            cursor: pointer;
        }
        .filter-row button:hover { color: var(--pink); border-color: var(--pink); }
        .filter-row button.active {
            background: rgba(238, 232, 223, 0.10);
            color: var(--cream);
            border-color: rgba(238, 232, 223, 0.45);
        }
        .filter-row button.active:hover {
            background: rgba(213, 125, 178, 0.15);
            color: var(--pink);
            border-color: var(--pink);
        }

        /* ---- Chatter items (playful, blockquote-style) ---- */
        .chatter-items {
            column-count: 3;
            column-gap: 40px;
        }
        @media (max-width: 900px) { .chatter-items { column-count: 2; } }
        @media (max-width: 560px) { .chatter-items { column-count: 1; } }

        .chatter-item {
            position: relative;
            break-inside: avoid;
            margin-bottom: 28px;
            padding: 14px 28px 14px 18px;
            background: rgba(18, 8, 16, 0.40);
            border: 1px solid rgba(238, 232, 223, 0.10);
            border-left: 2px solid rgba(213, 125, 178, 0.45);
            border-radius: 6px;
            transition: border-color 0.15s, background 0.15s;
        }
        .chatter-item:hover {
            background: rgba(18, 8, 16, 0.55);
            border-color: rgba(238, 232, 223, 0.25);
            border-left-color: var(--pink);
        }
        .chatter-item .save-btn {
            position: absolute;
            top: 4px;
            right: 4px;
        }
        .chatter-item .headline {
            font-style: italic;
            font-size: 15px;
            line-height: 1.4;
            color: var(--cream);
            margin-bottom: 6px;
        }
        .chatter-item .headline a {
            color: inherit;
            text-decoration: none;
        }
        .chatter-item .headline a:hover { color: var(--pink); }
        /* Clamp every chatter headline to 4 lines with an ellipsis */
        .chatter-item .headline {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .chatter-item .headline mark.kw-hit {
            background: rgba(213, 125, 178, 0.30);
            color: var(--cream);
            padding: 0 2px;
            border-radius: 2px;
            font-weight: 700;
            font-style: normal;
        }
        .chatter-item .attribution {
            font-size: 11px;
            color: rgba(238, 232, 223, 0.55);
            font-style: italic;
            letter-spacing: 0.03em;
        }
        .chatter-item .attribution::before { content: "— "; }
        .chatter-item .badge-mini {
            display: inline-block;
            font-style: normal;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 2px 8px 1px;
            margin-right: 6px;
            border-radius: 999px;
            border: 1px solid currentColor;
            color: var(--pale-pink);
            background: transparent;
        }
        .chatter-item .badge-mini.social {
            color: var(--pink);
        }

        .status {
            text-align: center;
            color: rgba(238, 232, 223, 0.55);
            font-style: italic;
            padding: 40px 12px;
            font-size: 13px;
        }

        /* ---- Footer ---- */
        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 10px;
            color: rgba(238, 232, 223, 0.55);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0 24px;
        }
        footer a {
            color: var(--cream);
            text-decoration: none;
            border-bottom: 1px solid rgba(238, 232, 223, 0.35);
        }
        footer a:hover { color: var(--pink); border-bottom-color: var(--pink); }
        footer .copyright {
            font-style: italic;
            margin-top: 8px;
            letter-spacing: 0.08em;
        }

    </style>
</head>

<script>
    const DIRECT_TERMS = [
        "quantum biolog", "quantum bioscien", "quantum bio-",
        "biological quantum", "biology of quantum",
        "quantum effects in biolog", "quantum effects in living", "quantum effects in life",
        "quantum phenomena in biolog", "quantum phenomena in living", "quantum phenomena in life",
        "quantum mechanics in biolog", "quantum mechanics in living",
        "quantum mechanics of biolog", "quantum mechanics of life",
        "quantum processes in biolog", "quantum processes in living",
        "quantum behavior in biolog", "quantum behavior in living",
        "quantum life", "quantum living", "living quantum",
        "quantum nature of biolog", "quantum nature of life",
        "quantum-enabled biolog", "quantum enabled biolog",
        "radical pair",
    ];
    const isDirect = (a) => {
        const text = ((a.title || "") + " " + (a.summary || "")).toLowerCase();
        return DIRECT_TERMS.some(t => text.includes(t));
    };
    const isChatter = (a) => a.source_category === "forums" || a.source_category === "social";

    const TZ = "America/Los_Angeles";
    function formatDateline(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        const date = d.toLocaleDateString("en-US", { timeZone: TZ, weekday: "short", month: "short", day: "2-digit", year: "numeric" });
        const time = d.toLocaleTimeString("en-US", { timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false, timeZoneName: "short" });
        return `${date} · ${time}`.toUpperCase();
    }
    function formatTimestamp(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        return d.toLocaleString("en-US", { timeZone: TZ, month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit", timeZoneName: "short" });
    }
    function formatArticleDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        const now = new Date();
        const hours = (now - d) / (1000 * 60 * 60);
        if (hours < 1)  return "< 1h ago";
        if (hours < 24) return `${Math.round(hours)}h ago`;
        if (hours < 48) return "yesterday";
        return d.toLocaleDateString("en-US", { timeZone: TZ, month: "short", day: "numeric", year: "numeric" });
    }
    function stripHtml(s) {
        const tmp = document.createElement("div");
        tmp.innerHTML = s || "";
        return (tmp.textContent || tmp.innerText || "").replace(/"/g, "&quot;");
    }

    function escapeHtml(s) {
        return (s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    // Given an article, return an HTML-safe snippet that centers on the
    // first-matched keyword — preferring the FULL sentence containing it,
    // falling back to a char-window if the sentence is too short/long.
    // The matched keyword is wrapped in <mark class="kw-hit"> for highlight.
    function extractSnippet(article) {
        const title   = article.title || "";
        const summary = article.summary || "";
        // For Bluesky-style posts, title is a prefix of summary — prefer summary.
        // For HN/Reddit titles + no body, summary is "" — use title.
        let text;
        if (summary && title && summary.toLowerCase()
                .startsWith(title.slice(0, Math.min(40, title.length)).toLowerCase())) {
            text = summary;
        } else if (summary) {
            text = (title ? title + " \u2014 " : "") + summary;
        } else {
            text = title;
        }
        text = (text || "").trim();
        const terms = article.matched_keywords || [];
        if (!text) return escapeHtml(title);

        // Find earliest matched keyword in text
        const lowered = text.toLowerCase();
        let firstPos = -1, matchedTerm = "";
        for (const term of terms) {
            if (!term) continue;
            const pos = lowered.indexOf(term.toLowerCase());
            if (pos !== -1 && (firstPos === -1 || pos < firstPos)) {
                firstPos = pos;
                matchedTerm = term;
            }
        }
        // No keyword in text — just show the title / text as-is
        if (firstPos === -1) {
            return escapeHtml(text.length > 140 ? text.slice(0, 140).trim() + "\u2026" : text);
        }

        // Walk back to start of sentence
        let sentStart = 0;
        for (let i = firstPos - 1; i >= 0; i--) {
            if (/[.!?\n]/.test(text[i])) { sentStart = i + 1; break; }
        }
        // Walk forward to end of sentence
        let sentEnd = text.length;
        for (let i = firstPos + matchedTerm.length; i < text.length; i++) {
            if (/[.!?\n]/.test(text[i])) { sentEnd = i + 1; break; }
        }

        let snippet = text.slice(sentStart, sentEnd).trim();
        let prefix = sentStart > 0;
        let suffix = sentEnd < text.length;

        // Fall back to a char window if sentence is too short or too long
        if (snippet.length < 30 || snippet.length > 240) {
            const before = 70, after = 110;
            const s = Math.max(0, firstPos - before);
            const e = Math.min(text.length, firstPos + matchedTerm.length + after);
            snippet = text.slice(s, e).trim();
            prefix = s > 0;
            suffix = e < text.length;
        }

        // Highlight the matched keyword inside the snippet
        const lowSnippet = snippet.toLowerCase();
        const pos = lowSnippet.indexOf(matchedTerm.toLowerCase());
        let html;
        if (pos !== -1) {
            html = escapeHtml(snippet.slice(0, pos))
                 + '<mark class="kw-hit">' + escapeHtml(snippet.slice(pos, pos + matchedTerm.length)) + '</mark>'
                 + escapeHtml(snippet.slice(pos + matchedTerm.length));
        } else {
            html = escapeHtml(snippet);
        }
        if (prefix) html = "\u2026 " + html;
        if (suffix) html = html + " \u2026";
        return html;
    }

    let allItems = [];
    let currentFilter = "all";
    // Sources currently selected (Set of normalized source names). Defaults
    // to all sources present in the loaded data.
    let selectedSources = new Set();
    let allSourcesSet = new Set();

    // Collapse HN + Bluesky (per-author source names) into single buckets.
    // Keep Reddit subreddits + Stack Exchange sites granular (they're meaningful groups).
    function normalizeSource(src) {
        const s = src || "(unknown)";
        if (s.startsWith("Hacker News")) return "Hacker News";
        if (s.startsWith("Bluesky")) return "Bluesky";
        return s;
    }

    function renderOneItem(a) {
        const when = a.date_iso ? formatArticleDate(a.date_iso) : "";
        const bits = [a.source];
        if (when) bits.push(when);
        const badgeClass = a.source_category === "social" ? "social" : "";
        const badgeLabel = a.source_category === "social" ? "Social" : "Forum";
        const snippet = extractSnippet(a);
        return `
            <div class="chatter-item">
                <button class="save-btn" data-link="${(a.link || '').replace(/"/g, '&quot;')}" aria-label="Save">${window.QBIO_SAVES_BOOKMARK_SVG || ''}</button>
                <div class="headline">
                    <span class="badge-mini ${badgeClass}">${badgeLabel}</span>
                    <a href="${a.link}" target="_blank" title="${stripHtml(a.title)}">${snippet}</a>
                </div>
                <div class="attribution">${bits.join(" · ")}</div>
            </div>`;
    }

    function applyFilter() {
        let items = allItems;
        if (currentFilter === "forums") items = items.filter(a => a.source_category === "forums");
        else if (currentFilter === "social") items = items.filter(a => a.source_category === "social");
        else if (currentFilter === "qbio") items = items.filter(isDirect);
        // Apply source-picker filter on top
        items = items.filter(a => selectedSources.has(normalizeSource(a.source)));

        const container = document.getElementById("chatter-items");
        if (!items.length) {
            container.innerHTML = '<div class="status">No chatter matches these filters.</div>';
            return;
        }
        container.innerHTML = items.map(renderOneItem).join("");
        updatePickerLabel();
        if (window.qbioRefreshSaveIcons) window.qbioRefreshSaveIcons();
    }

    function updatePickerLabel() {
        const label = document.getElementById("source-picker-label");
        const total = allSourcesSet.size;
        const picked = selectedSources.size;
        if (picked === total) label.textContent = "Sources: all";
        else if (picked === 0) label.textContent = "Sources: none";
        else label.textContent = `Sources: ${picked}/${total}`;
    }

    // Map a row from /api/sources (tier tabs) to the same normalized-source key
    // we use on the feed side, so configured sources and feed-derived sources merge.
    function configuredSourceKey(row) {
        const name   = row.source_name || "";
        const target = row.target || "";
        if (name === "Reddit") return target ? `Reddit \u00b7 ${target}` : null;  // "Reddit · r/quantumbiology"
        if (name.startsWith("Hacker News")) return "Hacker News";
        if (name === "Stack Exchange") {
            // target format from scraper: "biology: quantum" — we want "Stack Exchange · biology"
            const site = (target.split(":")[0] || "").trim();
            return site ? `Stack Exchange \u00b7 ${site}` : null;
        }
        if (name === "Bluesky") return "Bluesky";
        return null;  // not a chatter source we care about
    }

    async function buildSourcePickerList() {
        // Count items per normalized source (from the full corpus, not the
        // current filter — keeps counts stable when users change filters)
        const counts = {};
        for (const a of allItems) {
            const key = normalizeSource(a.source);
            counts[key] = (counts[key] || 0) + 1;
        }

        // Also pull all CONFIGURED chatter sources from /api/sources so silent
        // ones (0 items this scrape) still appear, grayed out.
        try {
            const r = await fetch("/api/sources");
            if (r.ok) {
                const data = await r.json();
                const tiers = data.tiers || {};
                const configuredRows = (tiers["Tier 3a"] || []).concat(tiers["Tier 3b"] || []);
                for (const row of configuredRows) {
                    const key = configuredSourceKey(row);
                    if (key && !(key in counts)) counts[key] = 0;
                }
            }
        } catch (e) { /* fall back to feed-only sources */ }

        const sortedKeys = Object.keys(counts).sort();
        allSourcesSet = new Set(sortedKeys);
        selectedSources = new Set(sortedKeys);  // default: all selected

        const list = document.getElementById("source-picker-list");
        list.innerHTML = sortedKeys.map(key => {
            const cls = counts[key] === 0 ? "empty" : "";
            return `
                <label class="${cls}" title="${counts[key] === 0 ? 'Configured but no items in this scrape' : ''}">
                    <input type="checkbox" data-src="${encodeURIComponent(key)}" checked>
                    <span class="label-name">${key}</span>
                    <span class="label-count">${counts[key]}</span>
                </label>`;
        }).join("");
        list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener("change", () => {
                const src = decodeURIComponent(cb.dataset.src);
                if (cb.checked) selectedSources.add(src);
                else selectedSources.delete(src);
                applyFilter();
            });
        });
        updatePickerLabel();
    }

    // --- Filter (All / Forums / Social / Direct Q.B.) ---
    document.querySelectorAll("#filters button").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll("#filters button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            applyFilter();
        });
    });

    // --- Source picker open/close + bulk actions ---
    const pickerBtn = document.getElementById("source-picker-btn");
    const pickerPanel = document.getElementById("source-picker-panel");
    pickerBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = !pickerPanel.hasAttribute("hidden");
        if (isOpen) {
            pickerPanel.setAttribute("hidden", "");
            pickerBtn.classList.remove("open");
        } else {
            pickerPanel.removeAttribute("hidden");
            pickerBtn.classList.add("open");
        }
    });
    document.addEventListener("click", (e) => {
        if (!pickerPanel.hasAttribute("hidden") && !pickerPanel.contains(e.target) && e.target !== pickerBtn) {
            pickerPanel.setAttribute("hidden", "");
            pickerBtn.classList.remove("open");
        }
    });
    document.getElementById("source-picker-all").addEventListener("click", (e) => {
        e.preventDefault();
        selectedSources = new Set(allSourcesSet);
        document.querySelectorAll("#source-picker-list input[type='checkbox']").forEach(cb => cb.checked = true);
        applyFilter();
    });
    document.getElementById("source-picker-none").addEventListener("click", (e) => {
        e.preventDefault();
        selectedSources = new Set();
        document.querySelectorAll("#source-picker-list input[type='checkbox']").forEach(cb => cb.checked = false);
        applyFilter();
    });

    fetch("/feed.json")
        .then(r => {
            if (!r.ok) throw new Error("NO FEED.JSON — scraper hasn't run yet.");
            return r.json();
        })
        .then(async (data) => {
            const articles = data.articles || [];
            allItems = articles
                .filter(isChatter)
                .slice()
                .sort((a, b) => (b.date_iso || "").localeCompare(a.date_iso || ""));

            // Register every chatter item with the saves layer so the bookmark
            // icons can post the full payload to /api/saves on click.
            allItems.forEach(a => window.qbioRegisterArticle && window.qbioRegisterArticle(a));

            document.getElementById("dateline").textContent =
                `${formatDateline(data.generated_at)} · ${allItems.length} CHATTER ITEMS`;
            document.getElementById("footer-timestamp").textContent =
                `Feed generated ${formatTimestamp(data.generated_at)}`;
            document.getElementById("status").remove();

            await buildSourcePickerList();
            applyFilter();
        })
        .catch(err => {
            document.getElementById("status").textContent = err.message;
        });
</script>

</body>
</html>
