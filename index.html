<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUBIE NEWS</title>
    <style>
        /* ---------- Brand Fonts ---------- */
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_pro.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_regular_italic_pro.otf") format("opentype"); font-weight: 400; font-style: italic; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_medium_pro.otf") format("opentype"); font-weight: 500; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_medium_italic_pro.otf") format("opentype"); font-weight: 500; font-style: italic; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_bold_pro.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: "Apercu Pro"; src: url("assets/fonts/apercu_bold_italic_pro.otf") format("opentype"); font-weight: 700; font-style: italic; font-display: swap; }
        @font-face { font-family: "Chap"; src: url("assets/fonts/Chap-Regular.woff2") format("woff2"); font-weight: 400; font-style: normal; font-display: swap; }

        /* ---------- QBI Palette ---------- */
        :root {
            --cream:       #EEE8DF;
            --cream-dim:   #E5DED2;
            --dark-purple: #2D1B30;
            --light-purple:#7D4A6E;
            --pink:        #D57DB2;
            --near-black:  #1A1416;
            --soft-text:   #3A3036;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: "Apercu Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--cream);
            color: var(--near-black);
            font-size: 15px;
            line-height: 1.45;
        }

        /* ---- Site nav: public group (left) + admin group in a box (right) ---- */
        .site-nav {
            background: var(--cream-dim);
            border-bottom: 1px solid rgba(45, 27, 48, 0.2);
            padding: 10px 24px;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .site-nav .nav-public, .site-nav .nav-admin { display: flex; align-items: center; }
        .site-nav a { text-decoration: none; border-bottom: none; margin: 0 6px; padding: 4px 8px; }
        .site-nav .sep { color: rgba(45, 27, 48, 0.35); padding: 0 2px; font-weight: 400; }
        .site-nav .nav-public a { color: var(--dark-purple); }
        .site-nav .nav-public a:hover { color: var(--pink); }
        .site-nav .nav-public a.active { color: var(--pink); border-bottom: 2px solid var(--pink); }
        .site-nav .nav-admin {
            border: 1px solid rgba(45, 27, 48, 0.25);
            border-radius: 3px;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.15);
        }
        .site-nav .nav-admin a { color: var(--light-purple); opacity: 0.8; }
        .site-nav .nav-admin a:hover { color: var(--pink); opacity: 1; }
        .site-nav .nav-admin a.active { color: var(--pink); opacity: 1; border-bottom: 2px solid var(--pink); }
        .site-nav .nav-admin .sep { color: rgba(125, 74, 110, 0.4); }

        .page {
            max-width: 820px;
            margin: 0 auto;
            padding: 36px 24px 0;
        }
        .page-wide {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .page-footer {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 24px 80px;
        }

        /* ---------- Masthead ---------- */
        .masthead {
            text-align: center;
            padding: 0 0 48px;
        }
        .masthead .title {
            font-family: "Chap", "Apercu Pro", sans-serif;
            font-weight: 400;
            font-size: 56px;
            letter-spacing: 0.06em;
            color: var(--dark-purple);
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }
        .masthead .subtitle {
            font-style: italic;
            font-size: 12px;
            color: var(--soft-text);
            margin: 14px 0 10px;
            letter-spacing: 0.05em;
        }
        .masthead .dateline {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--dark-purple);
            font-weight: 700;
        }
        .masthead .schedule {
            font-size: 11px;
            font-style: italic;
            color: var(--soft-text);
            margin-top: 8px;
            letter-spacing: 0.02em;
        }

        /* ---------- Recent Stories (chronological, 2-col per side) ---------- */
        .recent-label {
            text-align: center;
            margin: 0 0 32px;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: 0.5em;
            color: var(--dark-purple);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 22px;
        }
        .recent-label::before,
        .recent-label::after {
            content: "";
            display: inline-block;
            width: 26px;
            height: 30px;
            background: url("assets/logo-icon.svg") no-repeat center / contain;
        }
        /* Recent section: left half = general, right half = direct QB */
        .recent-wrap {
            display: flex;
            align-items: flex-start;
            gap: 48px;
            padding-bottom: 56px;
        }
        .recent-main {
            flex: 1 1 0;
        }
        .recent-main-label {
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.35em;
            color: var(--pink);
            text-transform: uppercase;
            margin-bottom: 22px;
            line-height: 1.3;
        }
        .recent-main-cols {
            position: relative;
            column-count: 2;
            column-gap: 32px;
            max-height: 1800px;
            overflow: hidden;
        }
        .recent-main-cols::after {
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 80px;
            background: linear-gradient(to bottom, transparent, var(--cream));
            pointer-events: none;
        }
        .recent-direct {
            flex: 1 1 0;
            border-left: 1px solid var(--dark-purple);
            padding-left: 48px;
            align-self: stretch;
        }
        .recent-direct-label {
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.35em;
            color: var(--light-purple);
            text-transform: uppercase;
            margin-bottom: 22px;
            line-height: 1.3;
        }
        .recent-direct-cols {
            position: relative;
            column-count: 2;
            column-gap: 32px;
            max-height: 1800px;
            overflow: hidden;
        }
        .recent-direct-cols::after {
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 80px;
            background: linear-gradient(to bottom, transparent, var(--cream));
            pointer-events: none;
        }
        .recent-direct .empty {
            color: var(--soft-text);
            font-style: italic;
            font-size: 12px;
        }
        @media (max-width: 900px) {
            .recent-wrap { gap: 36px; }
            .recent-direct { padding-left: 36px; }
            .recent-direct-cols { column-count: 1; }
        }
        @media (max-width: 680px) {
            .recent-wrap { flex-direction: column; gap: 32px; }
            .recent-direct {
                border-left: none;
                border-top: 1px solid var(--dark-purple);
                padding-left: 0;
                padding-top: 28px;
            }
            .recent-direct-cols { column-count: 2; }
        }
        @media (max-width: 440px) {
            .recent-main-cols { column-count: 1; }
            .recent-direct-cols { column-count: 1; }
        }
        .story-recent {
            break-inside: avoid;
            margin-bottom: 24px;
            min-height: 150px;  /* floor: keeps short cards from creating gaps */
        }
        .story-recent h3 {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 6px;
            text-transform: uppercase;
        }
        .story-recent h3 a {
            color: var(--near-black);
            text-decoration: none;
            border-bottom: 1.5px solid var(--near-black);
        }
        .story-recent h3 a:hover { color: var(--pink); border-bottom-color: var(--pink); }

        /* ---------- Filed Stories (columns by score) ---------- */
        .filed-label {
            text-align: center;
            margin: 0 0 24px;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.4em;
            color: var(--light-purple);
            text-transform: uppercase;
        }
        /* Filed section: 4-column flow sorted by relevance score */
        .columns {
            column-count: 4;
            column-gap: 32px;
        }
        @media (max-width: 900px) { .columns { column-count: 3; column-gap: 28px; } }
        @media (max-width: 680px) { .columns { column-count: 2; column-gap: 24px; } }
        @media (max-width: 440px) { .columns { column-count: 1; } }
        .article {
            break-inside: avoid;
            margin-bottom: 28px;
        }
        .article h3 {
            font-size: 14px;
            font-weight: 700;
            margin: 0 0 6px;
            text-transform: uppercase;
            line-height: 1.25;
        }
        .article:nth-child(3n) h3 { font-size: 16px; }
        .article:nth-child(5n) h3 { font-size: 13px; }
        .article h3 a {
            color: var(--dark-purple);
            text-decoration: none;
            border-bottom: 1px solid var(--dark-purple);
        }
        .article h3 a:hover { color: var(--pink); border-bottom-color: var(--pink); }
        .article .developing { color: var(--pink); font-weight: 700; font-style: italic; }

        /* ---------- Meta block (source + badge + date) — shared ---------- */
        .meta {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--light-purple);
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: inherit;
            flex-wrap: wrap;
            gap: 8px;
        }
        .meta .source { font-style: italic; }
        .meta .date   { color: var(--soft-text); }

        /* ---------- LLM "why it matters" blurbs ---------- */
        .blurb {
            font-style: italic;
            color: var(--soft-text);
            line-height: 1.5;
            font-size: 12px;
            margin: 6px 0 8px;
        }
        .story-recent .blurb {
            font-size: 12px;
        }
        .article .blurb {
            font-size: 11px;
            line-height: 1.4;
        }

        /* ---------- Matched-keyword pills ---------- */
        .keyword-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
            justify-content: inherit;
        }
        .keyword-pill {
            font-size: 9px;
            font-style: italic;
            color: var(--light-purple);
            padding: 1px 6px 2px;
            border: 1px solid var(--light-purple);
            border-radius: 2px;
            background: transparent;
            letter-spacing: 0.04em;
            white-space: nowrap;
            opacity: 0.85;
        }
        .keyword-pill-more {
            font-size: 9px;
            font-style: italic;
            color: var(--soft-text);
            padding: 1px 4px;
            letter-spacing: 0.04em;
        }

        /* ---------- Category badges ---------- */
        .badge {
            display: inline-block;
            padding: 2px 7px 1px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-style: normal;
        }
        .badge-paper    { background: var(--dark-purple);  color: var(--cream); }
        .badge-preprint { background: var(--light-purple); color: var(--cream); }
        .badge-news     { background: var(--pink);         color: var(--near-black); }
        .badge-forums   { background: transparent;         color: var(--dark-purple); border: 1px solid var(--dark-purple); }
        .badge-social   { background: transparent;         color: var(--light-purple); border: 1px solid var(--light-purple); }

        /* ---------- Status / empty ---------- */
        .status {
            text-align: center;
            color: var(--soft-text);
            font-style: italic;
            padding: 40px 12px;
            font-size: 13px;
        }

        /* ---------- Search section ---------- */
        .search-section {
            max-width: 900px;
            margin: 20px auto 60px;
            padding: 0 24px;
        }
        .search-label {
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.45em;
            color: var(--dark-purple);
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        .search-label::before,
        .search-label::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 23px;
            background: url("assets/logo-icon.svg") no-repeat center / contain;
        }
        .search-subtitle {
            text-align: center;
            font-style: italic;
            font-size: 12px;
            color: var(--soft-text);
            margin: 0 0 22px;
            letter-spacing: 0.03em;
        }
        .search-input-wrap {
            position: relative;
            margin-bottom: 10px;
        }
        .search-input-wrap::before {
            content: "\2315";
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--light-purple);
            font-size: 18px;
            font-weight: 700;
            pointer-events: none;
        }
        #search-input {
            width: 100%;
            font-family: inherit;
            font-size: 15px;
            padding: 11px 14px 11px 44px;
            border: 1px solid var(--light-purple);
            background: var(--cream);
            color: var(--near-black);
            border-radius: 3px;
        }
        #search-input:focus {
            outline: 2px solid var(--pink);
            outline-offset: -2px;
            border-color: var(--pink);
        }
        #search-input:disabled { opacity: 0.6; }
        .search-stats {
            text-align: center;
            font-size: 11px;
            color: var(--soft-text);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-style: italic;
        }
        .search-results {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid rgba(125, 74, 110, 0.3);
            background: var(--cream-dim);
            border-radius: 3px;
            padding: 8px 18px;
        }
        .search-results .search-item {
            padding: 12px 0;
            border-bottom: 1px dotted rgba(45, 27, 48, 0.2);
        }
        .search-results .search-item:last-child { border-bottom: none; }
        .search-results .search-item .title {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.01em;
        }
        .search-results .search-item .title a {
            color: var(--near-black);
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        .search-results .search-item .title a:hover {
            color: var(--pink);
            border-bottom-color: var(--pink);
        }
        .search-results .search-item .meta {
            font-size: 11px;
            color: var(--light-purple);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-results .search-item .meta .source { font-style: italic; }
        .search-results .search-item .blurb {
            font-size: 12px;
            color: var(--soft-text);
            font-style: italic;
            line-height: 1.4;
        }
        .search-results .empty-row {
            text-align: center;
            color: var(--soft-text);
            font-style: italic;
            padding: 36px 20px;
            font-size: 13px;
        }
        .search-results::-webkit-scrollbar { width: 8px; }
        .search-results::-webkit-scrollbar-track { background: transparent; }
        .search-results::-webkit-scrollbar-thumb {
            background: rgba(125, 74, 110, 0.45);
            border-radius: 4px;
        }
        .search-results::-webkit-scrollbar-thumb:hover {
            background: rgba(125, 74, 110, 0.7);
        }

        /* ---------- Chatter section (preview on the Report) ---------- */
        .chatter-section {
            max-width: 1100px;
            margin: 20px auto 60px;
            padding: 0 24px;
        }
        .chatter-label {
            text-align: center;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.4em;
            color: var(--light-purple);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .chatter-subtitle {
            text-align: center;
            font-style: italic;
            color: var(--soft-text);
            font-size: 12px;
            margin-bottom: 36px;
            letter-spacing: 0.03em;
        }
        .chatter-items {
            column-count: 2;
            column-gap: 40px;
        }
        @media (max-width: 680px) { .chatter-items { column-count: 1; } }
        .chatter-item {
            break-inside: avoid;
            margin-bottom: 22px;
            padding-left: 18px;
            border-left: 2px solid rgba(125, 74, 110, 0.35);
        }
        .chatter-item .headline {
            font-style: italic;
            font-size: 15px;
            line-height: 1.4;
            color: var(--near-black);
            margin-bottom: 6px;
        }
        .chatter-item .headline a {
            color: inherit;
            text-decoration: none;
        }
        .chatter-item .headline a:hover { color: var(--pink); }
        .chatter-item .attribution {
            font-size: 11px;
            color: var(--light-purple);
            font-style: italic;
            letter-spacing: 0.03em;
        }
        .chatter-item .attribution::before { content: "— "; }
        .chatter-more {
            text-align: center;
            margin-top: 28px;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .chatter-more a {
            color: var(--light-purple);
            text-decoration: none;
            border-bottom: 1px solid var(--light-purple);
            padding-bottom: 2px;
        }
        .chatter-more a:hover { color: var(--pink); border-bottom-color: var(--pink); }

        /* ---------- Footer ---------- */
        footer {
            margin-top: 72px;
            text-align: center;
            font-size: 10px;
            color: var(--soft-text);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        footer a {
            color: var(--dark-purple);
            text-decoration: none;
            border-bottom: 1px solid var(--dark-purple);
        }
        footer a:hover { color: var(--pink); border-bottom-color: var(--pink); }
        footer .copyright {
            font-style: italic;
            margin-top: 8px;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>

<nav class="site-nav">
    <div class="nav-public">
        <a href="/" class="active">Report</a>
        <span class="sep">·</span>
        <a href="/chatter">Chatter</a>
        <span class="sep">·</span>
        <a href="/suggest">Suggest</a>
    </div>
    <div class="nav-admin">
        <a href="/admin">Admin</a>
    </div>
</nav>

<div class="page">

    <header class="masthead">
        <div class="title">QUBIE NEWS</div>
        <div class="subtitle">&mdash; the quantum biology headline aggregator &mdash;</div>
        <div class="dateline" id="dateline">Loading&hellip;</div>
        <div class="schedule">feed refreshes twice daily at 08:00 &amp; 18:00 UTC</div>
    </header>

    <div id="status" class="status">Loading feed&hellip;</div>

</div>

<section class="search-section" id="search-section">
    <div class="search-label">Search the Feed</div>
    <div class="search-subtitle">&mdash; every article indexed, no scrape needed &mdash;</div>
    <div class="search-input-wrap">
        <input type="search" id="search-input"
               placeholder="Search titles, summaries, keywords, blurbs&hellip;"
               autocomplete="off" disabled>
    </div>
    <div class="search-stats" id="search-stats">Loading the index&hellip;</div>
    <div class="search-results" id="search-results"></div>
</section>

<div class="page-wide">
    <div id="recent-container"></div>
</div>

<div id="chatter-container"></div>

<div class="page-wide">
    <div id="filed-container"></div>
</div>

<div class="page-footer">
    <footer>
        <div id="footer-timestamp">Feed generated&hellip;</div>
        <div style="margin-top:6px;"><a href="https://quantumbiologydao.xyz" target="_blank">quantumbiologydao.xyz</a></div>
        <div class="copyright">&copy; Quantum Biology DAO</div>
    </footer>
</div>

<script>
    // ---------- Date helpers ----------
    function formatDateline(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        const date = d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "2-digit", year: "numeric" });
        const time = d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
        return `${date} · ${time}`.toUpperCase();
    }
    function formatTimestamp(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
    }
    function formatArticleDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        const now = new Date();
        const hours = (now - d) / (1000 * 60 * 60);
        // If within 48 hours, show relative; otherwise show date
        if (hours < 1)  return "< 1h ago";
        if (hours < 24) return `${Math.round(hours)}h ago`;
        if (hours < 48) return "yesterday";
        return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }
    function stripHtml(s) {
        const tmp = document.createElement("div");
        tmp.innerHTML = s || "";
        return (tmp.textContent || tmp.innerText || "").replace(/"/g, "&quot;");
    }

    // ---------- Markup helpers ----------
    function categoryLabel(cat) {
        const labels = {
            "paper": "Paper", "preprint": "Preprint",
            "news": "News",   "forums": "Forum",  "social": "Social"
        };
        return labels[cat] || cat;
    }
    function metaHtml(article) {
        const badge = `<span class="badge badge-${article.source_category}">${categoryLabel(article.source_category)}</span>`;
        const date  = article.date_iso ? `<span class="date">${formatArticleDate(article.date_iso)}</span>` : "";
        return `
            <div class="meta">
                ${badge}
                <span class="source">${article.source}</span>
                ${date}
            </div>
            ${keywordPillsHtml(article)}`;
    }

    function keywordPillsHtml(article) {
        const kws = article.matched_keywords || [];
        if (!kws.length) return "";
        const MAX_SHOW = 4;
        const shown = kws.slice(0, MAX_SHOW);
        const pills = shown.map(k => `<span class="keyword-pill">${k}</span>`).join("");
        const more  = kws.length > MAX_SHOW
            ? `<span class="keyword-pill-more">+${kws.length - MAX_SHOW} more</span>`
            : "";
        return `<div class="keyword-pills">${pills}${more}</div>`;
    }

    // ---------- Main ----------
    fetch("feed.json")
        .then(r => {
            if (!r.ok) throw new Error("NO FEED.JSON — RUN THE SCRAPER FIRST");
            return r.json();
        })
        .then(data => {
            const articles = data.articles || [];
            const count = articles.length;
            document.getElementById("dateline").textContent =
                `${formatDateline(data.generated_at)} · ${String(count).padStart(2, "0")} DISPATCHES`;
            document.getElementById("footer-timestamp").textContent =
                `Feed generated ${formatTimestamp(data.generated_at)}`;
            document.getElementById("status").remove();

            if (count === 0) {
                document.getElementById("filed-container").innerHTML =
                    '<div class="status">NO DISPATCHES ON THE WIRE. RE-RUN SCRAPER.</div>';
                return;
            }

            // --- Direct-QB filter (used by both Recent and Filed sections) ---
            // Substring matches (not whole words) so "quantum biolog"
            // catches biology, biological, biologist, biologically, etc.
            const DIRECT_TERMS = [
                // Direct field names
                "quantum biolog",              // biology, biological, biologist, biologically
                "quantum bioscien",            // bioscience, biosciences
                "quantum bio-",
                "biological quantum",
                "biology of quantum",
                // "Quantum X in/of Y" framings
                "quantum effects in biolog",
                "quantum effects in living",
                "quantum effects in life",
                "quantum phenomena in biolog",
                "quantum phenomena in living",
                "quantum phenomena in life",
                "quantum mechanics in biolog",
                "quantum mechanics in living",
                "quantum mechanics of biolog",
                "quantum mechanics of life",
                "quantum processes in biolog",
                "quantum processes in living",
                "quantum behavior in biolog",
                "quantum behavior in living",
                // Life/living framings
                "quantum life",
                "quantum living",
                "living quantum",
                // Newer / alternative framings
                "quantum nature of biolog",
                "quantum nature of life",
                "quantum-enabled biolog",
                "quantum enabled biolog",
                // Core mechanism — current flagship hypothesis of the field
                "radical pair",                // also catches "radical pair mechanism"
            ];
            const isDirect = (a) => {
                const text = ((a.title || "") + " " + (a.summary || "")).toLowerCase();
                return DIRECT_TERMS.some(t => text.includes(t));
            };

            // --- Category split: "serious" = papers/preprints/news; "chatter" = forums/social ---
            const CHATTER_CATEGORIES = new Set(["forums", "social"]);
            const isChatter = (a) => CHATTER_CATEGORIES.has(a.source_category);
            const isSerious = (a) => !isChatter(a);

            // Source-capping: no more than N items per source in a given list.
            // Preserves input order; drops overflow.
            const capPerSource = (list, maxPerSource) => {
                const counts = {};
                const result = [];
                for (const a of list) {
                    const key = a.source || "(unknown)";
                    counts[key] = (counts[key] || 0) + 1;
                    if (counts[key] <= maxPerSource) result.push(a);
                }
                return result;
            };

            // --- Build buckets (scraper already sorted by date desc) ---
            const seriousAll = articles.filter(isSerious);

            // Recent pools: direct-QB vs adjacent, each capped at 3 per source
            const qbioPool    = capPerSource(
                seriousAll.filter(isDirect), 3);
            const generalPool = capPerSource(
                seriousAll.filter(a => !isDirect(a)), 3);

            // Each side gets up to 40 items; the CSS max-height clips
            // visually so both sides end at the same horizontal line.
            const RECENT_CAP = 40;
            const recentQbio    = qbioPool.slice(0, RECENT_CAP);
            const recentGeneral = generalPool.slice(0, RECENT_CAP);
            const recentQbioSet    = new Set(recentQbio.map(a => a.link));
            const recentGeneralSet = new Set(recentGeneral.map(a => a.link));

            const shownSerious = new Set([
                ...recentQbioSet,
                ...recentGeneralSet,
            ]);

            // Filed: all remaining serious items by date (no cap)
            const filed = seriousAll
                .filter(a => !shownSerious.has(a.link))
                .slice()
                .sort((a, b) => (b.date_iso || "").localeCompare(a.date_iso || ""));

            // Chatter preview: top 10 most recent chatter items, max 2 per source
            const chatterAll     = articles.filter(isChatter);
            const chatterPreview = capPerSource(chatterAll, 2).slice(0, 10);

            // --- Render helpers ---
            const blurbHtml = (a) => a.blurb ? `<div class="blurb">${a.blurb}</div>` : "";

            const renderRecent = (a) => `
                <div class="story-recent">
                    <h3><a href="${a.link}" target="_blank" title="${stripHtml(a.summary)}">${a.title}</a></h3>
                    ${blurbHtml(a)}
                    ${metaHtml(a)}
                </div>`;
            const renderFiled = (a) => {
                const developing = a.score >= 2 ? '<span class="developing">Developing&hellip;</span> ' : '';
                return `
                    <div class="article">
                        <h3>${developing}<a href="${a.link}" target="_blank" title="${stripHtml(a.summary)}">${a.title}</a></h3>
                        ${blurbHtml(a)}
                        ${metaHtml(a)}
                    </div>`;
            };

            // --- Recent section (split layout) ---
            if (recentGeneral.length || recentQbio.length) {
                const generalHtml = recentGeneral.map(renderRecent).join("") ||
                    '<div class="empty">No general dispatches today.</div>';
                const qbioHtml = recentQbio.length
                    ? recentQbio.map(renderRecent).join("")
                    : '<div class="empty">No direct quantum biology dispatches today.</div>';
                document.getElementById("recent-container").innerHTML = `
                    <div class="recent-label">Recent Dispatches</div>
                    <div class="recent-wrap">
                        <div class="recent-main">
                            <div class="recent-main-label">Recent &middot; Quantum Biology</div>
                            <div class="recent-main-cols">${qbioHtml}</div>
                        </div>
                        <div class="recent-direct">
                            <div class="recent-direct-label">Recent &middot; Adjacent Fields</div>
                            <div class="recent-direct-cols">${generalHtml}</div>
                        </div>
                    </div>
                `;
            }

            // --- Filed section (single 4-column flow, by date) ---
            if (filed.length) {
                document.getElementById("filed-container").innerHTML = `
                    <div class="filed-label">Filed &middot; By Date</div>
                    <div class="columns">${filed.map(renderFiled).join("")}</div>
                `;
            }

            // --- Search section (client-side over all articles) ---
            (() => {
                const input   = document.getElementById("search-input");
                const results = document.getElementById("search-results");
                const stats   = document.getElementById("search-stats");

                // Index: all articles sorted by date desc
                const indexed = articles.slice().sort(
                    (a, b) => (b.date_iso || "").localeCompare(a.date_iso || "")
                );
                const MAX_RENDER = 200;

                const buildHaystack = (a) => (
                    (a.title || "") + " " +
                    (a.summary || "") + " " +
                    (a.source || "") + " " +
                    ((a.matched_keywords || []).join(" ")) + " " +
                    (a.blurb || "")
                ).toLowerCase();

                // Precompute haystacks once
                indexed.forEach(a => { a._hay = buildHaystack(a); });

                const renderItem = (a) => {
                    const when  = a.date_iso ? formatArticleDate(a.date_iso) : "";
                    const badge = `<span class="badge badge-${a.source_category}">${categoryLabel(a.source_category)}</span>`;
                    const blurbLine = a.blurb ? `<div class="blurb">${a.blurb}</div>` : "";
                    const dateBit   = when ? `<span>&middot; ${when}</span>` : "";
                    return `
                        <div class="search-item">
                            <div class="title">
                                <a href="${a.link}" target="_blank" title="${stripHtml(a.summary)}">${a.title}</a>
                            </div>
                            <div class="meta">
                                ${badge}
                                <span class="source">${a.source}</span>
                                ${dateBit}
                            </div>
                            ${blurbLine}
                        </div>`;
                };

                const doSearch = (raw) => {
                    const q = (raw || "").trim().toLowerCase();
                    let matches;
                    if (!q) {
                        matches = indexed;
                        stats.textContent = `${indexed.length} articles indexed`;
                    } else {
                        const terms = q.split(/\s+/).filter(Boolean);
                        matches = indexed.filter(a => terms.every(t => a._hay.includes(t)));
                        stats.textContent =
                            `${matches.length} match${matches.length === 1 ? "" : "es"} for "${raw.trim()}"`;
                    }

                    if (!matches.length) {
                        results.innerHTML =
                            '<div class="empty-row">No matches. Try fewer or different words.</div>';
                        return;
                    }
                    const toShow = matches.slice(0, MAX_RENDER);
                    let html = toShow.map(renderItem).join("");
                    if (matches.length > MAX_RENDER) {
                        html += `<div class="empty-row">Showing first ${MAX_RENDER} of ${matches.length}. Refine your search to see more.</div>`;
                    }
                    results.innerHTML = html;
                    results.scrollTop = 0;
                };

                let searchTimer;
                input.addEventListener("input", (e) => {
                    clearTimeout(searchTimer);
                    searchTimer = setTimeout(() => doSearch(e.target.value), 150);
                });
                // Escape clears the search
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Escape") {
                        input.value = "";
                        doSearch("");
                    }
                });

                input.disabled = false;
                doSearch("");
            })();

            // --- Chatter preview section (forums + social, playful) ---
            const renderChatter = (a) => {
                const when = a.date_iso ? formatArticleDate(a.date_iso) : "";
                const bits = [a.source];
                if (when) bits.push(when);
                return `
                    <div class="chatter-item">
                        <div class="headline">
                            <a href="${a.link}" target="_blank" title="${stripHtml(a.summary)}">${a.title}</a>
                        </div>
                        <div class="attribution">${bits.join(" · ")}</div>
                    </div>`;
            };
            if (chatterPreview.length) {
                document.getElementById("chatter-container").innerHTML = `
                    <section class="chatter-section">
                        <div class="chatter-label">Chatter &middot; From the Field</div>
                        <div class="chatter-subtitle">overheard in forums, social, and elsewhere</div>
                        <div class="chatter-items">${chatterPreview.map(renderChatter).join("")}</div>
                        <div class="chatter-more">
                            <a href="/chatter">See all chatter &rarr;</a>
                        </div>
                    </section>`;
            }
        })
        .catch(err => {
            document.getElementById("status").textContent = err.message;
        });
</script>

</body>
</html>
